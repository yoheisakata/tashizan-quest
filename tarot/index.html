<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
<title>タロット占い 🔮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Cinzel:wght@400;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

:root {
  --gold: #d4a843;
  --purple: #7c3aed;
  --purple-light: #a855f7;
  --bg: #08080f;
  --card-bg: #0f0f1e;
  --text: #e8dcc8;
  --text-dim: #8a7a66;
}

body {
  font-family: 'Noto Serif JP', serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 10%, rgba(124,58,237,0.15) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(212,168,67,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(124,58,237,0.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* Stars */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 2px;
  height: 2px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle var(--d, 3s) var(--delay, 0s) infinite alternate;
}
@keyframes twinkle {
  0% { opacity: 0.1; transform: scale(0.8); }
  100% { opacity: 0.9; transform: scale(1.2); }
}

.container {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 600px;
  padding: 24px 20px 60px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Header */
.header {
  text-align: center;
  margin-bottom: 32px;
}
.header h1 {
  font-family: 'Cinzel', serif;
  font-size: 2rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.08em;
  text-shadow: 0 0 30px rgba(212,168,67,0.4);
  margin-bottom: 6px;
}
.header .subtitle {
  font-size: 0.8rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
}
.back-link {
  position: absolute;
  top: 20px;
  left: 20px;
  color: var(--text-dim);
  text-decoration: none;
  font-size: 0.8rem;
  display: flex;
  align-items: center;
  gap: 4px;
  transition: color 0.2s;
}
.back-link:hover { color: var(--gold); }

/* Spread selector */
.spread-selector {
  display: flex;
  gap: 10px;
  margin-bottom: 28px;
  flex-wrap: wrap;
  justify-content: center;
}
.spread-btn {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 100px;
  color: var(--text-dim);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.78rem;
  padding: 7px 16px;
  cursor: pointer;
  transition: all 0.2s;
}
.spread-btn:hover { border-color: rgba(212,168,67,0.6); color: var(--gold); }
.spread-btn.active {
  background: rgba(212,168,67,0.12);
  border-color: var(--gold);
  color: var(--gold);
}

/* Question input */
.question-area {
  width: 100%;
  margin-bottom: 24px;
  position: relative;
}
.question-area label {
  display: block;
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}
.question-input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(212,168,67,0.2);
  border-radius: 12px;
  color: var(--text);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.9rem;
  padding: 12px 16px;
  resize: none;
  outline: none;
  transition: border-color 0.2s;
  height: 60px;
}
.question-input:focus { border-color: rgba(212,168,67,0.5); }
.question-input::placeholder { color: var(--text-dim); }

/* Draw button */
.draw-btn {
  background: linear-gradient(135deg, rgba(212,168,67,0.2), rgba(124,58,237,0.2));
  border: 1px solid rgba(212,168,67,0.5);
  border-radius: 100px;
  color: var(--gold);
  font-family: 'Cinzel', serif;
  font-size: 1rem;
  font-weight: 700;
  padding: 14px 40px;
  cursor: pointer;
  transition: all 0.3s;
  letter-spacing: 0.1em;
  margin-bottom: 40px;
  position: relative;
  overflow: hidden;
}
.draw-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(212,168,67,0.1), rgba(124,58,237,0.1));
  opacity: 0;
  transition: opacity 0.3s;
}
.draw-btn:hover::before { opacity: 1; }
.draw-btn:hover {
  border-color: var(--gold);
  box-shadow: 0 0 30px rgba(212,168,67,0.25), 0 0 60px rgba(124,58,237,0.15);
  transform: translateY(-1px);
}
.draw-btn:active { transform: translateY(0); }
.draw-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* Cards layout */
.cards-area {
  width: 100%;
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  margin-bottom: 40px;
}

/* Card */
.card-slot {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.card-position-label {
  font-size: 0.68rem;
  color: var(--text-dim);
  letter-spacing: 0.08em;
  text-align: center;
}

.card-wrapper {
  width: 110px;
  height: 190px;
  perspective: 1000px;
}
.card-inner {
  width: 100%;
  height: 100%;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
}
.card-inner.flipped {
  transform: rotateY(180deg);
}
.card-inner.reversed-flip {
  transform: rotateY(180deg) rotateZ(180deg);
}

.card-face {
  position: absolute;
  inset: 0;
  border-radius: 12px;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-back {
  background: linear-gradient(135deg, #1a0a2e, #0d1b3e);
  border: 2px solid rgba(212,168,67,0.3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  cursor: pointer;
  transition: border-color 0.3s, box-shadow 0.3s;
  overflow: hidden;
}
.card-back::before {
  content: '';
  position: absolute;
  inset: 6px;
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 8px;
}
.card-back:hover {
  border-color: rgba(212,168,67,0.7);
  box-shadow: 0 0 20px rgba(212,168,67,0.2), 0 0 40px rgba(124,58,237,0.15);
}

.card-front {
  transform: rotateY(180deg);
  border: 2px solid rgba(212,168,67,0.4);
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.card-front-bg {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: linear-gradient(160deg, #12091f, #0a1428, #120923);
}
.card-rw-img {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
}
.card-name-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.92));
  padding: 14px 4px 4px;
  text-align: center;
  z-index: 2;
}
.card-fb-emoji {
  display: none;
  position: absolute;
  inset: 0;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  padding: 8px;
}
.card-front-bg.img-err .card-rw-img { display: none; }
.card-front-bg.img-err .card-fb-emoji { display: flex; }
.card-front-bg.img-err .card-name-bar {
  position: static;
  background: transparent;
  padding: 4px 4px 0;
}
.card-fb-emoji-icon {
  font-size: 2.4rem;
  line-height: 1;
  filter: drop-shadow(0 0 8px rgba(212,168,67,0.4));
}
.card-name-en {
  font-family: 'Cinzel', serif;
  font-size: 0.5rem;
  color: var(--gold);
  letter-spacing: 0.08em;
  text-align: center;
  opacity: 0.9;
  line-height: 1.3;
}
.card-name-jp {
  font-size: 0.62rem;
  color: rgba(232,220,200,0.8);
  text-align: center;
  margin-top: 1px;
  line-height: 1.3;
}
.card-reversed-badge {
  font-size: 0.5rem;
  color: #f87171;
  text-align: center;
  padding: 3px 8px;
  background: rgba(248,113,113,0.1);
  border-top: 1px solid rgba(248,113,113,0.2);
}

/* Reading result */
.reading-result {
  width: 100%;
  display: none;
  flex-direction: column;
  gap: 20px;
}
.reading-result.visible { display: flex; }

.card-reading {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(212,168,67,0.15);
  border-radius: 16px;
  padding: 20px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s, transform 0.5s;
}
.card-reading.show {
  opacity: 1;
  transform: translateY(0);
}
.reading-position {
  font-size: 0.68rem;
  color: var(--purple-light);
  letter-spacing: 0.1em;
  margin-bottom: 6px;
}
.reading-card-name {
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.reversed-tag {
  font-size: 0.6rem;
  color: #f87171;
  background: rgba(248,113,113,0.1);
  border: 1px solid rgba(248,113,113,0.3);
  border-radius: 100px;
  padding: 2px 8px;
}
.reading-meaning {
  font-size: 0.82rem;
  color: var(--text);
  line-height: 1.8;
  margin-bottom: 10px;
}
.reading-advice {
  font-size: 0.78rem;
  color: var(--text-dim);
  line-height: 1.7;
  padding-top: 10px;
  border-top: 1px solid rgba(255,255,255,0.06);
}

/* Overall message */
.overall-message {
  background: linear-gradient(135deg, rgba(124,58,237,0.08), rgba(212,168,67,0.06));
  border: 1px solid rgba(212,168,67,0.25);
  border-radius: 16px;
  padding: 22px;
  opacity: 0;
  transform: translateY(12px);
  transition: opacity 0.5s, transform 0.5s;
}
.overall-message.show {
  opacity: 1;
  transform: translateY(0);
}
.overall-message h3 {
  font-family: 'Cinzel', serif;
  font-size: 0.8rem;
  color: var(--gold);
  letter-spacing: 0.12em;
  margin-bottom: 12px;
  text-align: center;
}
.overall-message p {
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.9;
  text-align: center;
}

/* Reset */
.reset-btn {
  background: transparent;
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 100px;
  color: var(--text-dim);
  font-family: 'Noto Serif JP', serif;
  font-size: 0.8rem;
  padding: 10px 28px;
  cursor: pointer;
  transition: all 0.2s;
  margin-top: 10px;
}
.reset-btn:hover { border-color: rgba(255,255,255,0.3); color: var(--text); }

/* Shimmer animation for cards being revealed */
@keyframes shimmer {
  0% { opacity: 0.4; }
  50% { opacity: 1; }
  100% { opacity: 0.4; }
}
.card-back.waiting {
  animation: shimmer 2s infinite;
}

/* Divider */
.divider {
  width: 100%;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(212,168,67,0.3), transparent);
  margin: 8px 0 32px;
}

/* Responsive */
@media (max-width: 400px) {
  .header h1 { font-size: 1.6rem; }
  .card-wrapper { width: 90px; height: 155px; }
  .card-emoji { font-size: 2.2rem; }
}
</style>
</head>

  <div class="reading-result" id="readingResult"></div>

  <!-- Reset button -->
  <button class="reset-btn" id="resetBtn" style="display:none">もう一度占う</button>

    reversed: { meaning: '自己批判、後悔、または変化への恐れ。自分を裁きすぎて前に進めていないかもしれません。', advice: '自分を赦すことから始めましょう。過去の失敗はあなたではありません。今こそ前を向いて。' }

    reversed: { meaning: '完成目前での停滞、または達成感の欠如。ゴールが見えているのに最後の一歩が踏み出せていない状態。', advice: 'もう少しで完成です。焦りや完璧主義を手放して、最後の仕上げに集中しましょう。' }

// Spread configurations
const SPREADS = {
  1: [
    { name: '現在の状況・メッセージ' }
  ],
  3: [
    { name: '過去' },
    { name: '現在' },
    { name: '未来' }
  ],
  5: [
    { name: '現状' },
    { name: '障害・課題' },
    { name: '深層心理' },
    { name: 'アドバイス' },
    { name: '結果・可能性' }
  ]
};

// Overall messages by spread
const OVERALL_MESSAGES = {
  1: (cards) => {
    const c = cards[0];
    const type = c.reversed ? '逆位置' : '正位置';
    return `「${c.nameJp}」の${type}が、今のあなたに語りかけています。${c.reversed ? c.upright.advice.replace(/。.*/, '。') : c.reversed ? c.upright.advice : c.upright.advice} 宇宙からのメッセージを受け取り、今日を大切に過ごしてください。`;
  },
  3: (cards) => {
    return `過去・現在・未来の3枚が、あなたの物語を紡いでいます。過去の「${cards[0].nameJp}」が土台となり、現在「${cards[1].nameJp}」の時を過ごし、未来には「${cards[2].nameJp}」の可能性が広がっています。流れを信じて、一歩一歩進んでください。`;
  },
  5: (cards) => {
    return `5枚のカードが、あなたの状況を多角的に照らし出しています。「${cards[3].nameJp}」のアドバイスを胸に刻み、「${cards[4].nameJp}」が示す可能性に向かって歩みを進めてください。星があなたを導いています。`;
  }
};

// State
let currentSpread = 1;
let drawnCards = [];
let revealedCount = 0;
let isReading = false;

// Init stars
function initStars() {
  const starsEl = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.cssText = `
      left: ${Math.random() * 100}%;
      top: ${Math.random() * 100}%;
      --d: ${2 + Math.random() * 4}s;
      --delay: ${Math.random() * 4}s;
      width: ${Math.random() > 0.8 ? 3 : 2}px;
      height: ${Math.random() > 0.8 ? 3 : 2}px;
      opacity: ${0.2 + Math.random() * 0.5};
    `;
    starsEl.appendChild(star);
  }
}

// Spread selector
document.querySelectorAll('.spread-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    if (isReading) return;
    document.querySelectorAll('.spread-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentSpread = parseInt(btn.dataset.spread);
  });
});

// Draw button
document.getElementById('drawBtn').addEventListener('click', startReading);
document.getElementById('resetBtn').addEventListener('click', resetReading);

function startReading() {
  if (isReading) return;
  isReading = true;
  revealedCount = 0;

  const btn = document.getElementById('drawBtn');
  btn.disabled = true;

  // Shuffle and pick cards
  const shuffled = [...CARDS].sort(() => Math.random() - 0.5);
  drawnCards = shuffled.slice(0, currentSpread).map(card => ({
    ...card,
    reversed: Math.random() < 0.35
  }));

  renderCards();
}

function renderCards() {
  const area = document.getElementById('cardsArea');
  area.innerHTML = '';

  const positions = SPREADS[currentSpread];

  drawnCards.forEach((card, i) => {
    const slot = document.createElement('div');
    slot.className = 'card-slot';

    const label = document.createElement('div');
    label.className = 'card-position-label';
    label.textContent = positions[i].name;

    const wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    const inner = document.createElement('div');
    inner.className = 'card-inner';

    // Back
    const back = document.createElement('div');
    back.className = 'card-face card-back waiting';
    back.innerHTML = '🔮';
    back.addEventListener('click', () => revealCard(i, inner, card));

    // Front
    const front = document.createElement('div');
    front.className = 'card-face card-front';
    front.innerHTML = `
      <div class="card-front-bg">
        <img class="card-rw-img" src="${RW_IMGS[card.id]}" alt="${card.nameJp}"
             onerror="this.parentNode.classList.add('img-err')">
        <div class="card-fb-emoji">
          <span class="card-fb-emoji-icon">${card.emoji}</span>
          <div class="card-name-en">${card.nameEn}</div>
          <div class="card-name-jp">${card.nameJp}</div>
        </div>
        <div class="card-name-bar">
          <div class="card-name-en">${card.nameEn}</div>
          <div class="card-name-jp">${card.nameJp}</div>
        </div>
      </div>
      ${card.reversed ? '<div class="card-reversed-badge">逆位置</div>' : ''}
    `;

    inner.appendChild(back);
    inner.appendChild(front);
    wrapper.appendChild(inner);
    slot.appendChild(label);
    slot.appendChild(wrapper);
    area.appendChild(slot);

    // Auto-reveal with delay
    setTimeout(() => {
      back.classList.remove('waiting');
      revealCard(i, inner, card);
    }, 600 + i * 700);
  });
}

function revealCard(index, inner, card) {
  if (inner.classList.contains('flipped') || inner.classList.contains('reversed-flip')) return;

  if (card.reversed) {
    inner.classList.add('reversed-flip');
  } else {
    inner.classList.add('flipped');
  }

  revealedCount++;
  if (revealedCount === currentSpread) {
    setTimeout(showReadings, 600);
  }
}

function showReadings() {
  const resultEl = document.getElementById('readingResult');
  resultEl.innerHTML = '';
  resultEl.classList.add('visible');

  const positions = SPREADS[currentSpread];

  drawnCards.forEach((card, i) => {
    const reading = document.createElement('div');
    reading.className = 'card-reading';

    const meaning = card.reversed ? card.reversed : card.upright;
    const posLabel = positions[i].name;

    reading.innerHTML = `
      <div class="reading-position">✦ ${posLabel}</div>
      <div class="reading-card-name">
        ${card.emoji} ${card.nameJp}（${card.nameEn}）
        ${card.reversed ? '<span class="reversed-tag">逆位置</span>' : ''}
      </div>
      <div class="reading-meaning">${meaning.meaning}</div>
      <div class="reading-advice">💫 ${meaning.advice}</div>
    `;

    resultEl.appendChild(reading);

    setTimeout(() => {
      reading.classList.add('show');
    }, 100 + i * 200);
  });

  // Overall message
  const overallEl = document.createElement('div');
  overallEl.className = 'overall-message';
  const msgFn = OVERALL_MESSAGES[currentSpread];
  const msg = msgFn ? msgFn(drawnCards) : '';
  overallEl.innerHTML = `
    <h3>✦ 総合メッセージ ✦</h3>
    <p>${msg}</p>
  `;
  resultEl.appendChild(overallEl);

  setTimeout(() => {
    overallEl.classList.add('show');
    document.getElementById('resetBtn').style.display = 'block';
    overallEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 400 + drawnCards.length * 200);
}

function resetReading() {
  isReading = false;
  drawnCards = [];
  revealedCount = 0;

  document.getElementById('cardsArea').innerHTML = '';
  document.getElementById('readingResult').innerHTML = '';
  document.getElementById('readingResult').classList.remove('visible');
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('drawBtn').disabled = false;

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

initStars();
</script>
