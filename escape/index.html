<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
<title>うちゅうせんだっしゅつ 🚀</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

body{
  font-family:'Nunito',sans-serif;
  background:#050a1a;color:#fff;
  min-height:100vh;overflow:hidden;
  user-select:none;-webkit-user-select:none;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}

#stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,2s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes twinkle{0%,100%{opacity:var(--min,.2)}50%{opacity:1}}

.screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:95px 18px 24px;
  z-index:1;transition:opacity .35s ease;
}
.screen.hidden{opacity:0;pointer-events:none}

/* progress dots */
#progress{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:none;gap:12px;z-index:10}
.dot{width:13px;height:13px;border-radius:50%;background:rgba(255,255,255,.18);transition:background .3s,box-shadow .3s}
.dot.done{background:#ffd32a;box-shadow:0 0 8px #ffd32a}
.dot.active{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.8)}

/* timer */
#timer-bar{position:fixed;top:44px;left:50%;transform:translateX(-50%);width:min(340px,88vw);height:9px;background:rgba(255,255,255,.1);border-radius:5px;z-index:10;display:none;overflow:hidden}
#timer-fill{height:100%;border-radius:5px;background:#2ed573;transition:width .1s linear,background .5s;width:100%}

/* round display */
#round-disp{position:fixed;top:60px;right:18px;font-size:.75rem;font-weight:900;color:rgba(255,255,255,.65);z-index:10;display:none}

/* title */
.title-ship{font-size:5.5rem;animation:float 3s ease-in-out infinite;margin-bottom:14px;filter:drop-shadow(0 0 24px rgba(96,197,255,.6))}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}
.title-text{font-size:2.3rem;font-weight:900;text-align:center;background:linear-gradient(135deg,#60c5ff,#c77dff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.25;margin-bottom:12px}
.title-sub{font-size:1rem;color:rgba(255,255,255,.7);text-align:center;line-height:1.7;margin-bottom:42px}
.btn-start{background:linear-gradient(135deg,#60c5ff,#c77dff);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;padding:20px 64px;cursor:pointer;box-shadow:0 8px 32px rgba(96,197,255,.45);transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.btn-start:active{transform:scale(.91)}

/* stage header */
.stage-title{font-size:1.4rem;font-weight:900;text-align:center;margin-bottom:6px}
.stage-inst{font-size:.86rem;color:rgba(255,255,255,.72);text-align:center;margin-bottom:24px;line-height:1.6}

/* stage 1 — color */
.orbs-area,.slots-area{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.orbs-area{margin-bottom:24px}
.orb{width:60px;height:60px;border-radius:50%;cursor:pointer;position:relative;transition:transform .2s cubic-bezier(.34,1.56,.64,1),box-shadow .2s,opacity .2s;flex-shrink:0}
.orb::after{content:'';position:absolute;top:9px;left:12px;width:17px;height:10px;background:rgba(255,255,255,.38);border-radius:50%;transform:rotate(-30deg)}
.orb.selected{transform:scale(1.2) translateY(-10px);box-shadow:0 14px 30px rgba(255,255,255,.4)!important}
.orb.placed{opacity:.3;pointer-events:none}
.slot{width:60px;height:60px;border-radius:50%;border:3px dashed rgba(255,255,255,.35);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:border-color .2s,transform .15s;background:rgba(255,255,255,.04);flex-shrink:0}
.slot.filled{border-style:solid;pointer-events:none}
.slot:not(.filled):active{transform:scale(.92)}

/* stage 2 — shape */
.shapes-row,.shape-slots{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;max-width:340px}
.shapes-row{margin-bottom:24px}
.shape-btn{width:70px;height:70px;background:rgba(255,255,255,.08);border:3px solid rgba(255,255,255,.22);border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.2rem;transition:transform .2s cubic-bezier(.34,1.56,.64,1),background .15s,opacity .2s}
.shape-btn.selected{background:rgba(255,255,255,.22);transform:scale(1.14) translateY(-7px);border-color:rgba(255,255,255,.9)}
.shape-btn.placed{opacity:.28;pointer-events:none}
.shape-slot{width:70px;height:70px;border:3px dashed rgba(255,255,255,.28);border-radius:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:2.2rem;filter:grayscale(1) brightness(.3);transition:filter .25s,border-color .2s}
.shape-slot.filled{border-style:solid;border-color:rgba(255,255,255,.5);filter:none;pointer-events:none}

/* stage 3 — count */
.s3-q{font-size:1rem;font-weight:900;color:#ffd32a;margin-bottom:16px;text-align:center}
.stars-display{min-height:110px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;justify-content:center;margin-bottom:22px;max-width:300px}
.count-item{font-size:2.2rem;animation:pop-in .3s cubic-bezier(.34,1.56,.64,1) backwards}
@keyframes pop-in{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.number-btns{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;max-width:340px}
.num-btn{width:58px;height:58px;border-radius:50%;border:3px solid rgba(255,255,255,.25);background:rgba(255,255,255,.07);color:#fff;font-family:'Nunito',sans-serif;font-size:1.5rem;font-weight:900;cursor:pointer;transition:transform .15s cubic-bezier(.34,1.56,.64,1),background .15s,border-color .15s}
.num-btn:active{transform:scale(.87)}

/* stage 4 — order */
.planets-area{display:flex;gap:12px;align-items:center;justify-content:center;min-height:150px;margin-bottom:24px;flex-wrap:wrap}
.planet{border-radius:50%;cursor:pointer;position:relative;box-shadow:0 8px 28px rgba(0,0,0,.5);transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .3s;flex-shrink:0}
.planet:active{transform:scale(.88)!important}
.planet.done{opacity:.35;pointer-events:none}
.order-num{position:absolute;top:1px;right:1px;width:22px;height:22px;background:rgba(0,0,0,.6);border-radius:50%;font-size:.78rem;font-weight:900;display:flex;align-items:center;justify-content:center}

/* overlays */
.clear-overlay{position:fixed;inset:0;background:rgba(5,10,26,.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.clear-overlay.show{opacity:1;pointer-events:all}
.clear-emoji{font-size:5rem;animation:float 1s ease-in-out infinite}
.clear-msg{font-size:2.1rem;font-weight:900;margin-top:14px}

#timeout-overlay{position:fixed;inset:0;background:rgba(5,10,26,.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
#timeout-overlay.show{opacity:1;pointer-events:all}
.to-emoji{font-size:4.5rem}
.to-msg{font-size:1.9rem;font-weight:900;margin:12px 0 6px}
.to-sub{font-size:.9rem;color:rgba(255,255,255,.65)}

/* round flash */
.round-flash{position:fixed;inset:0;background:rgba(46,213,115,.14);z-index:50;pointer-events:none;animation:flash-fade .45s ease forwards}
@keyframes flash-fade{0%{opacity:1}100%{opacity:0}}

/* ending */
.ending-rocket{font-size:6rem;animation:launch 2.2s ease-in forwards;filter:drop-shadow(0 0 32px rgba(255,211,42,.7))}
@keyframes launch{0%{transform:translateY(0) scale(1);opacity:1}80%{opacity:1}100%{transform:translateY(-240px) scale(.6);opacity:0}}
.ending-title{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,#ffd32a,#ff6b81);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;margin-bottom:10px}
.ending-sub{font-size:1.05rem;color:rgba(255,255,255,.78);text-align:center;line-height:1.7;margin-bottom:42px}
.btn-retry{background:linear-gradient(135deg,#ffd32a,#ff8c00);border:none;border-radius:50px;color:#fff;font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:900;padding:16px 44px;cursor:pointer;box-shadow:0 6px 24px rgba(255,211,42,.4);transition:transform .15s cubic-bezier(.34,1.56,.64,1)}
.btn-retry:active{transform:scale(.92)}

@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
.shake{animation:shake .38s ease}
.particle{position:fixed;border-radius:3px;pointer-events:none;z-index:99;animation:fall var(--dur) ease-in forwards}
@keyframes fall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(90vh) rotate(720deg) scale(.5)}}
</style>
</head>
<body>

<div id="stars-bg"></div>

<div id="progress">
  <div class="dot" id="dot1"></div>
  <div class="dot" id="dot2"></div>
  <div class="dot" id="dot3"></div>
  <div class="dot" id="dot4"></div>
</div>
<div id="timer-bar"><div id="timer-fill"></div></div>
<div id="round-disp"></div>

<!-- Title -->
<div class="screen" id="screen-title">
  <div class="title-ship">🚀</div>
  <div class="title-text">うちゅうせん<br>だっしゅつ！</div>
  <div class="title-sub">うちゅうせんがこわれちゃった！<br>パズルをといて<br>にげよう！</div>
  <button class="btn-start" onclick="startGame()">はじめる！</button>
</div>

<!-- Stage 1 -->
<div class="screen hidden" id="screen-stage1">
  <div class="stage-title">⚡ いろをあわせよう！</div>
  <div class="stage-inst">おなじいろのばしょに<br>エネルギーをいれてね！</div>
  <div class="orbs-area" id="orbs-area"></div>
  <div class="slots-area" id="slots-area"></div>
</div>

<!-- Stage 2 -->
<div class="screen hidden" id="screen-stage2">
  <div class="stage-title">🔧 かたちをあわせよう！</div>
  <div class="stage-inst">おなじかたちのあなに<br>はめてね！よ〜くみてね！</div>
  <div class="shapes-row" id="shapes-row"></div>
  <div class="shape-slots" id="shape-slots"></div>
</div>

<!-- Stage 3 -->
<div class="screen hidden" id="screen-stage3">
  <div class="stage-title">⭐ ほしをかぞえよう！</div>
  <div class="s3-q" id="s3-q">⭐はいくつあるかな？</div>
  <div class="stars-display" id="stars-display"></div>
  <div class="number-btns" id="number-btns"></div>
</div>

<!-- Stage 4 -->
<div class="screen hidden" id="screen-stage4">
  <div class="stage-title">🪐 ちいさいじゅんにタップ！</div>
  <div class="stage-inst">いちばんちいさいものから<br>じゅんばんにタップしてね！</div>
  <div class="planets-area" id="planets-area"></div>
</div>

<!-- Ending -->
<div class="screen hidden" id="screen-ending">
  <div class="ending-rocket">🚀</div>
  <div class="ending-title">だっしゅつせいこう！</div>
  <div class="ending-sub">うちゅうせんがなおったよ！<br>やったね！🎉✨</div>
  <button class="btn-retry" onclick="restartGame()">もういちど！</button>
</div>

<!-- Clear overlay -->
<div class="clear-overlay" id="clear-overlay">
  <div class="clear-emoji" id="clear-emoji">✨</div>
  <div class="clear-msg" id="clear-msg">せいかい！</div>
</div>

<!-- Timeout overlay -->
<div id="timeout-overlay">
  <div class="to-emoji">⏰</div>
  <div class="to-msg">じかんぎれ！</div>
  <div class="to-sub">もういちどやってみよう！</div>
</div>

<script>
// ── Audio ──────────────────────────────────────
let _ac = null;
function ac(){if(!_ac)try{_ac=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}return _ac}
function beep(f,d,t='sine',v=.22){try{const c=ac();if(!c)return;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+d);o.start(c.currentTime);o.stop(c.currentTime+d)}catch(e){}}
function sndClick(){beep(440,.06)}
function sndWrong(){beep(160,.32,'sawtooth',.13)}
function sndPop(){beep(640,.09);setTimeout(()=>beep(880,.07),60)}
function sndClear(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18),i*100))}
function sndWin(){[523,659,784,1047,1319,1047,1319,1568].forEach((f,i)=>setTimeout(()=>beep(f,.15),i*75))}
function sndTimeout(){beep(300,.1);setTimeout(()=>beep(220,.3,'triangle',.15),120)}

// ── Utility ────────────────────────────────────
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function addShake(el){el.classList.remove('shake');void el.offsetWidth;el.classList.add('shake');setTimeout(()=>el.classList.remove('shake'),400)}

// ── Stars ──────────────────────────────────────
(function makeStars(){
  const bg=document.getElementById('stars-bg');
  for(let i=0;i<110;i++){
    const s=document.createElement('div');s.className='star';
    const sz=Math.random()*2.4+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--dur:${1.5+Math.random()*3}s;--min:${.1+Math.random()*.3};--delay:${Math.random()*3}s;`;
    bg.appendChild(s);
  }
})();

// ── Timer ──────────────────────────────────────
const TIMER_SEC=22;
let _timer=null;

function startTimer(secs,onExpire){
  stopTimer();
  let left=secs;
  const bar=document.getElementById('timer-bar');
  const fill=document.getElementById('timer-fill');
  bar.style.display='block';fill.style.width='100%';fill.style.background='#2ed573';
  _timer=setInterval(()=>{
    left-=.1;
    const pct=Math.max(0,left/secs*100);
    fill.style.width=pct+'%';
    if(pct>55)fill.style.background='#2ed573';
    else if(pct>25)fill.style.background='#ffd32a';
    else fill.style.background='#ff4757';
    if(left<=0){stopTimer();showTimeout(onExpire)}
  },100);
}
function stopTimer(){clearInterval(_timer);_timer=null;document.getElementById('timer-bar').style.display='none'}
function showTimeout(retry){
  sndTimeout();
  const ov=document.getElementById('timeout-overlay');
  ov.classList.add('show');
  setTimeout(()=>{ov.classList.remove('show');if(retry)retry()},1600);
}

// ── Round helpers ──────────────────────────────
function setRound(text){const d=document.getElementById('round-disp');d.textContent=text||'';d.style.display=text?'block':'none'}
function flashRound(cb){const f=document.createElement('div');f.className='round-flash';document.body.appendChild(f);setTimeout(()=>f.remove(),500);sndPop();setTimeout(cb,500)}

// ── Screens ────────────────────────────────────
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.add('hidden'));document.getElementById(id).classList.remove('hidden')}
function setProgress(s){
  const p=document.getElementById('progress');p.style.display=s>0?'flex':'none';
  for(let i=1;i<=4;i++){const d=document.getElementById(`dot${i}`);d.className='dot'+(i<s?' done':i===s?' active':'')}
}

// ── Clear overlay ──────────────────────────────
function showClear(emoji,cb){
  document.getElementById('clear-emoji').textContent=emoji;
  const ov=document.getElementById('clear-overlay');ov.classList.add('show');
  spawnConfetti();setTimeout(()=>{ov.classList.remove('show');cb()},1700);
}

// ── Confetti ───────────────────────────────────
function spawnConfetti(n=38){
  const colors=['#ff4757','#ffd32a','#2ed573','#1e90ff','#c77dff','#ff6b81','#00cec9'];
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=7+Math.random()*11;
    p.style.cssText=`left:${5+Math.random()*90}%;top:${-5+Math.random()*20}%;width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};--dur:${1+Math.random()*1.4}s;animation-delay:${Math.random()*.25}s;`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),3000);
  }
}

// ── Game flow ──────────────────────────────────
function startGame(){sndClick();setProgress(1);setupStage1();showScreen('screen-stage1')}
function restartGame(){sndClick();stopTimer();setRound(null);setProgress(0);showScreen('screen-title')}

// ══════════════════════════════════════════════
// STAGE 1 — Color Matching  (5色 / 3ラウンド)
// ひっかけ: red vs orange, blue vs cyan
// ══════════════════════════════════════════════
const COLORS=[
  {id:'red',   bg:'#ff4757',shadow:'rgba(255,71,87,.55)'},
  {id:'orange',bg:'#ff8c00',shadow:'rgba(255,140,0,.55)'},
  {id:'blue',  bg:'#1e90ff',shadow:'rgba(30,144,255,.55)'},
  {id:'cyan',  bg:'#00cec9',shadow:'rgba(0,206,201,.55)'},
  {id:'yellow',bg:'#ffd32a',shadow:'rgba(255,211,42,.55)'},
];
const S1_TOTAL=3;
let s1round,s1sel,s1placed,s1colors;

function setupStage1(){s1round=0;startS1Round()}
function startS1Round(){
  s1sel=null;s1placed=0;
  setRound(`${s1round+1} / ${S1_TOTAL} もんだい`);
  s1colors=shuffle(COLORS).slice(0,4);
  const orbOrder=shuffle([...s1colors]);
  const slotOrder=shuffle([...s1colors]);
  const orbs=document.getElementById('orbs-area');
  const slots=document.getElementById('slots-area');
  orbs.innerHTML='';slots.innerHTML='';
  orbOrder.forEach(c=>{
    const el=document.createElement('div');
    el.className='orb';el.id=`orb-${c.id}`;
    el.style.background=c.bg;el.style.boxShadow=`0 6px 20px ${c.shadow}`;
    el.onclick=()=>s1pick(c.id);orbs.appendChild(el);
  });
  slotOrder.forEach(c=>{
    const el=document.createElement('div');
    el.className='slot';el.id=`slot-${c.id}`;el.style.borderColor=c.bg;
    el.onclick=()=>s1drop(c.id);slots.appendChild(el);
  });
  startTimer(TIMER_SEC,startS1Round);
}
function s1pick(id){
  const orb=document.getElementById(`orb-${id}`);if(orb.classList.contains('placed'))return;
  sndClick();
  if(s1sel)document.getElementById(`orb-${s1sel}`)?.classList.remove('selected');
  s1sel=(s1sel===id)?null:id;
  if(s1sel)orb.classList.add('selected');
}
function s1drop(sid){
  if(!s1sel)return;
  const slot=document.getElementById(`slot-${sid}`);if(!slot||slot.classList.contains('filled'))return;
  if(s1sel===sid){
    sndPop();
    const c=COLORS.find(x=>x.id===s1sel);
    slot.style.background=c.bg;slot.style.boxShadow=`0 0 18px ${c.shadow}`;slot.classList.add('filled');
    const orb=document.getElementById(`orb-${s1sel}`);orb.classList.remove('selected');orb.classList.add('placed');
    s1sel=null;
    if(++s1placed===4){
      stopTimer();s1round++;
      if(s1round>=S1_TOTAL){sndClear();showClear('⚡',()=>{setProgress(2);setupStage2();showScreen('screen-stage2')})}
      else flashRound(startS1Round);
    }
  }else{sndWrong();addShake(slot)}
}

// ══════════════════════════════════════════════
// STAGE 2 — Shape Matching  (6形 / 2ラウンド)
// ひっかけ: 🔺上三角 vs 🔻下三角、🔴赤まる vs 🟣紫まる
// ══════════════════════════════════════════════
const SHAPES=[
  {id:'red-circ',  e:'🔴'},
  {id:'purp-circ', e:'🟣'},  // ひっかけ
  {id:'tri-up',    e:'🔺'},
  {id:'tri-down',  e:'🔻'},  // ひっかけ
  {id:'blue-sq',   e:'🟦'},
  {id:'star',      e:'⭐'},
];
const S2_TOTAL=2;
let s2round,s2sel,s2placed;

function setupStage2(){s2round=0;startS2Round()}
function startS2Round(){
  s2sel=null;s2placed=0;
  setRound(`${s2round+1} / ${S2_TOTAL} もんだい`);
  document.getElementById('shapes-row').innerHTML='';
  document.getElementById('shape-slots').innerHTML='';
  shuffle(SHAPES).forEach(s=>{
    const el=document.createElement('div');el.className='shape-btn';el.id=`shp-${s.id}`;el.textContent=s.e;
    el.onclick=()=>s2pick(s.id);document.getElementById('shapes-row').appendChild(el);
  });
  shuffle(SHAPES).forEach(s=>{
    const el=document.createElement('div');el.className='shape-slot';el.id=`sslot-${s.id}`;el.textContent=s.e;
    el.onclick=()=>s2drop(s.id);document.getElementById('shape-slots').appendChild(el);
  });
  startTimer(TIMER_SEC,startS2Round);
}
function s2pick(id){
  const btn=document.getElementById(`shp-${id}`);if(btn.classList.contains('placed'))return;
  sndClick();
  if(s2sel)document.getElementById(`shp-${s2sel}`)?.classList.remove('selected');
  s2sel=(s2sel===id)?null:id;
  if(s2sel)btn.classList.add('selected');
}
function s2drop(sid){
  if(!s2sel)return;
  const slot=document.getElementById(`sslot-${sid}`);if(!slot||slot.classList.contains('filled'))return;
  if(s2sel===sid){
    sndPop();slot.classList.add('filled');
    const btn=document.getElementById(`shp-${s2sel}`);btn.classList.remove('selected');btn.classList.add('placed');
    s2sel=null;
    if(++s2placed===6){
      stopTimer();s2round++;
      if(s2round>=S2_TOTAL){sndClear();showClear('🔧',()=>{setProgress(3);setupStage3();showScreen('screen-stage3')})}
      else flashRound(startS2Round);
    }
  }else{sndWrong();addShake(slot)}
}

// ══════════════════════════════════════════════
// STAGE 3 — Counting  (ひっかけ: ⭐以外の絵文字混入 / 3問)
// ══════════════════════════════════════════════
const DISTRACTORS=['🚀','🌙','👾','🛸'];
const S3_TOTAL=3;
let s3round,s3ans;

function setupStage3(){s3round=0;startS3Round()}
function startS3Round(){
  s3ans=1+Math.floor(Math.random()*8);
  const dist=1+Math.floor(Math.random()*4);
  setRound(`${s3round+1} / ${S3_TOTAL} もんだい`);
  const items=[];
  for(let i=0;i<s3ans;i++)items.push('⭐');
  for(let i=0;i<dist;i++)items.push(DISTRACTORS[Math.floor(Math.random()*DISTRACTORS.length)]);
  const disp=document.getElementById('stars-display');disp.innerHTML='';
  shuffle(items).forEach((e,i)=>{
    const el=document.createElement('div');el.className='count-item';el.textContent=e;
    el.style.animationDelay=`${i*.05}s`;disp.appendChild(el);
  });
  const choices=makeChoices(s3ans,0,12,5);
  const btns=document.getElementById('number-btns');btns.innerHTML='';
  choices.forEach(n=>{
    const btn=document.createElement('button');btn.className='num-btn';btn.textContent=n;
    btn.onclick=()=>s3guess(n,btn);btns.appendChild(btn);
  });
  startTimer(18,startS3Round);
}
function makeChoices(correct,min,max,count){
  const set=new Set([correct]);let att=0;
  while(set.size<count&&att<60){const v=Math.max(min,Math.min(max,correct+Math.floor(Math.random()*5)-2));if(v!==correct)set.add(v);att++}
  for(let i=min;i<=max&&set.size<count;i++)set.add(i);
  return[...set].sort((a,b)=>a-b);
}
function s3guess(n,btn){
  if(n===s3ans){
    stopTimer();sndPop();
    btn.style.background='#2ed573';btn.style.borderColor='#2ed573';
    setTimeout(()=>{
      s3round++;
      if(s3round>=S3_TOTAL){sndClear();showClear('⭐',()=>{setProgress(4);setupStage4();showScreen('screen-stage4')})}
      else flashRound(startS3Round);
    },400);
  }else{
    sndWrong();
    btn.style.background='rgba(255,71,87,.28)';btn.style.borderColor='rgba(255,71,87,.7)';
    addShake(btn);
    setTimeout(()=>{btn.style.background='';btn.style.borderColor=''},700);
  }
}

// ══════════════════════════════════════════════
// STAGE 4 — Size Order  (4惑星 / 2ラウンド)
// ══════════════════════════════════════════════
const PLANETS=[
  {id:'xs',size:42, bg:'linear-gradient(135deg,#a29bfe,#6c5ce7)',order:1},
  {id:'s', size:64, bg:'linear-gradient(135deg,#fd79a8,#e17055)',order:2},
  {id:'m', size:90, bg:'linear-gradient(135deg,#00cec9,#0984e3)',order:3},
  {id:'l', size:116,bg:'linear-gradient(135deg,#ffd32a,#f97316)',order:4},
];
const S4_TOTAL=2;
let s4round,s4next,s4done;

function setupStage4(){s4round=0;startS4Round()}
function startS4Round(){
  s4next=1;s4done=0;
  setRound(`${s4round+1} / ${S4_TOTAL} もんだい`);
  const area=document.getElementById('planets-area');area.innerHTML='';
  shuffle(PLANETS).forEach(p=>{
    const el=document.createElement('div');el.className='planet';el.id=`planet-${p.id}`;
    el.style.width=el.style.height=p.size+'px';el.style.background=p.bg;
    el.onclick=()=>s4tap(p.order,el);area.appendChild(el);
  });
  startTimer(TIMER_SEC,startS4Round);
}
function s4tap(order,el){
  if(order===s4next){
    sndPop();
    const b=document.createElement('div');b.className='order-num';b.textContent=order;
    el.appendChild(b);el.classList.add('done');
    s4next++;s4done++;
    if(s4done===4){
      stopTimer();s4round++;
      if(s4round>=S4_TOTAL){sndWin();showClear('🚀',()=>showEnding())}
      else flashRound(startS4Round);
    }
  }else{sndWrong();addShake(el)}
}

// ── Ending ─────────────────────────────────────
function showEnding(){
  stopTimer();setRound(null);setProgress(0);
  showScreen('screen-ending');
  spawnConfetti(50);setTimeout(()=>spawnConfetti(40),900);setTimeout(()=>spawnConfetti(30),1800);
  sndWin();
}
</script>
