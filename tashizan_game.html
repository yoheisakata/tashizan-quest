<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>たしざんクエスト⚔️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d1a;--card:#1a1a2e;--card2:#16213e;
  --gold:#f5c518;--red:#ff4757;--green:#2ed573;--blue:#1e90ff;--purple:#a855f7;
  --text:#eee;--muted:#777;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:12px;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 10%,rgba(168,85,247,0.12) 0%,transparent 50%),radial-gradient(ellipse at 80% 90%,rgba(30,144,255,0.1) 0%,transparent 50%);pointer-events:none;z-index:0;}

/* ── SCREENS ── */
.screen{display:none;position:fixed;inset:0;z-index:50;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:var(--bg);overflow-y:auto;}
.screen.active{display:flex;}
.big-btn{background:linear-gradient(135deg,#f5c518,#e6a817);border:none;border-radius:16px;color:#1a0a00;font-family:'Nunito',sans-serif;font-size:1.2rem;font-weight:900;padding:14px 40px;cursor:pointer;box-shadow:0 6px 20px rgba(245,197,24,0.35);margin:6px;transition:transform 0.1s;}
.big-btn:active{transform:scale(0.94);}
.big-btn.red{background:linear-gradient(135deg,#ff4757,#c0392b);color:#fff;box-shadow:0 6px 20px rgba(255,71,87,0.3);}
.big-btn.purple{background:linear-gradient(135deg,#a855f7,#7c3aed);color:#fff;box-shadow:0 6px 20px rgba(168,85,247,0.3);}

/* ── TITLE ── */
.title-hero{font-size:3rem;margin-bottom:6px;}
.title-main{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#f5c518,#ff6b6b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;}
.title-sub{color:var(--muted);font-size:0.85rem;margin-bottom:20px;}
/* save card */
.save-card{background:var(--card);border:1px solid rgba(245,197,24,0.3);border-radius:16px;padding:12px 18px;margin-bottom:16px;width:100%;max-width:300px;display:flex;align-items:center;gap:12px;}
.save-card-avatar{font-size:2.2rem;}
.save-card-info{flex:1;}
.save-card-name{font-size:0.9rem;font-weight:900;color:var(--gold);}
.save-card-detail{font-size:0.65rem;color:var(--muted);margin-top:2px;}
.save-card-btns{display:flex;flex-direction:column;gap:5px;}
.save-small-btn{border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:0.7rem;font-weight:900;padding:5px 10px;cursor:pointer;}
.save-small-btn.load{background:linear-gradient(135deg,#2ed573,#1e9950);color:#fff;}
.save-small-btn.del{background:rgba(255,71,87,0.2);color:var(--red);}
/* in-game save toast */
.save-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(46,213,115,0.9);color:#000;font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:900;padding:8px 20px;border-radius:100px;z-index:999;opacity:0;pointer-events:none;transition:opacity 0.3s;}
.save-toast.show{opacity:1;}

/* ── CHAR SELECT ── */
.char-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;width:100%;max-width:360px;margin:12px 0;}
.char-card{background:var(--card);border:2px solid rgba(255,255,255,0.1);border-radius:16px;padding:12px 8px;text-align:center;cursor:pointer;transition:all 0.15s;}
.char-card:active{transform:scale(0.95);}
.char-card.selected{border-color:var(--gold);background:rgba(245,197,24,0.1);}
.char-emoji{font-size:2.4rem;margin-bottom:4px;}
.char-name{font-size:0.75rem;font-weight:900;color:var(--gold);}
.char-desc{font-size:0.6rem;color:var(--muted);margin-top:2px;}

/* ── GAME WRAP ── */
.game-wrap{position:relative;z-index:1;width:100%;max-width:420px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.coin-pill{display:flex;align-items:center;gap:5px;background:var(--card);border:1px solid rgba(245,197,24,0.3);border-radius:100px;padding:5px 12px;}
.coin-pill span{font-size:1rem;font-weight:900;color:var(--gold);}
.shop-btn{background:linear-gradient(135deg,#a855f7,#7c3aed);border:none;border-radius:100px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:900;padding:7px 14px;cursor:pointer;}
.shop-btn:active{transform:scale(0.95);}
.battle-btn-wrap{display:flex;gap:6px;}
.battle-start-btn{background:linear-gradient(135deg,#ff4757,#c0392b);border:none;border-radius:100px;color:#fff;font-family:'Nunito',sans-serif;font-size:0.8rem;font-weight:900;padding:7px 14px;cursor:pointer;}
.battle-start-btn:active{transform:scale(0.95);}

/* ── HERO PANEL ── */
.char-panel{background:var(--card);border-radius:18px;padding:12px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.07);display:flex;gap:10px;align-items:center;}
.char-avatar{font-size:2.8rem;text-align:center;min-width:56px;}
.char-info{flex:1;}
.char-info-name{font-size:0.95rem;font-weight:900;color:var(--gold);margin-bottom:3px;}
.equipped-row{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:4px;}
.equipped-tag{background:rgba(255,255,255,0.07);border-radius:7px;padding:2px 7px;font-size:0.6rem;color:var(--muted);}
.equipped-tag span{color:var(--text);}
.bar-row{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.bar-label{font-size:0.58rem;color:var(--muted);width:20px;}
.bar-track{flex:1;background:rgba(255,255,255,0.1);border-radius:100px;height:6px;overflow:hidden;}
.bar-fill{height:100%;border-radius:100px;transition:width 0.4s;}
.bar-fill.hp{background:linear-gradient(90deg,#ff4757,#ff6b81);}
.bar-fill.exp{background:linear-gradient(90deg,#f5c518,#ff9800);}
.bar-val{font-size:0.58rem;color:var(--muted);min-width:34px;text-align:right;}
.stat-row{display:flex;gap:5px;margin-top:3px;}
.stat-pill{background:rgba(255,255,255,0.06);border-radius:7px;padding:2px 7px;font-size:0.6rem;color:var(--muted);}
.stat-pill b{color:var(--text);}


.level-badge{text-align:center;margin-bottom:7px;}
.level-badge span{background:rgba(168,85,247,0.2);color:#c084fc;font-size:0.68rem;font-weight:700;padding:3px 12px;border-radius:100px;border:1px solid rgba(168,85,247,0.3);}

/* ── QUESTION ── */
.question-card{background:var(--card);border-radius:18px;padding:12px 10px;text-align:center;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);}
.emoji-row{display:flex;align-items:center;justify-content:center;gap:7px;min-height:38px;margin-bottom:6px;}
.emoji-group{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;max-width:140px;}
.emoji-item{font-size:1.3rem;line-height:1.1;}
.plus-sign{font-size:1.6rem;font-weight:900;color:var(--blue);flex-shrink:0;}
.question-num{font-size:2rem;font-weight:900;}
.question-num .num{color:var(--gold);}

/* ── ANSWERS ── */
.answers{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:7px;}
.ans-btn{background:var(--card2);border:2px solid rgba(255,255,255,0.1);border-radius:13px;color:var(--text);font-family:'Nunito',sans-serif;font-size:1.8rem;font-weight:900;padding:14px 10px;cursor:pointer;transition:all 0.12s;}
.ans-btn:active{transform:scale(0.93);}
.ans-btn.correct{background:rgba(46,213,115,0.2);border-color:var(--green);color:var(--green);animation:pop 0.3s ease;}
.ans-btn.wrong{background:rgba(255,71,87,0.2);border-color:var(--red);color:var(--red);animation:shake 0.3s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.feedback{text-align:center;font-size:1rem;font-weight:900;height:26px;margin-bottom:3px;}
.feedback.correct{color:var(--green);}
.feedback.wrong{color:var(--red);}

/* ── COIN POP ── */
.coin-pop{position:fixed;pointer-events:none;z-index:999;animation:coinFly 0.9s ease forwards;}
@keyframes coinFly{0%{transform:translateY(0) scale(0.8);opacity:1;}60%{opacity:1;}100%{transform:translateY(-80px) scale(1.3);opacity:0;}}

/* ── LEVEL UP OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:80;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:20px;}
.overlay.show{display:flex;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.overlay-box{background:var(--card);border:2px solid var(--gold);border-radius:22px;padding:24px 28px;max-width:300px;width:100%;}
.lvup-emoji{font-size:3rem;margin-bottom:6px;}
.lvup-title{font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:4px;}
.lvup-desc{color:var(--muted);font-size:0.85rem;margin-bottom:12px;}
.lvup-stats{display:flex;gap:8px;justify-content:center;margin-bottom:14px;flex-wrap:wrap;}
.lvup-stat{background:rgba(255,255,255,0.06);border-radius:9px;padding:7px 12px;font-size:0.75rem;}
.lvup-stat b{color:var(--gold);display:block;font-size:0.95rem;}

/* ══════════════════════════
   ── BATTLE SCREEN ──
══════════════════════════ */
.battle-screen{display:none;position:fixed;inset:0;z-index:60;flex-direction:column;background:linear-gradient(180deg,#0a0a18 0%,#1a0a2e 100%);overflow:hidden;}
.battle-screen.active{display:flex;}

/* battle bg stars */
.battle-screen::before{content:'';position:absolute;inset:0;background-image:
  radial-gradient(1px 1px at 15% 20%,rgba(255,255,255,0.5) 0%,transparent 100%),
  radial-gradient(1px 1px at 40% 10%,rgba(255,255,255,0.4) 0%,transparent 100%),
  radial-gradient(1px 1px at 70% 15%,rgba(255,255,255,0.6) 0%,transparent 100%),
  radial-gradient(1px 1px at 85% 8%,rgba(255,255,255,0.3) 0%,transparent 100%),
  radial-gradient(1px 1px at 25% 5%,rgba(255,255,255,0.4) 0%,transparent 100%);
  pointer-events:none;}

/* ground */
.battle-ground{position:absolute;bottom:0;left:0;right:0;height:80px;background:linear-gradient(180deg,transparent,rgba(100,60,20,0.3));border-top:2px solid rgba(100,60,20,0.4);}

/* top bar */
.battle-topbar{display:flex;justify-content:space-between;align-items:flex-start;padding:14px 16px 0;position:relative;z-index:2;}
.b-stat-box{background:rgba(0,0,0,0.5);border-radius:12px;padding:8px 12px;min-width:130px;border:1px solid rgba(255,255,255,0.1);}
.b-name{font-size:0.7rem;font-weight:900;margin-bottom:4px;}
.b-name.hero{color:var(--gold);}
.b-name.monster{color:var(--red);}
.b-hp-track{background:rgba(255,255,255,0.1);border-radius:100px;height:8px;overflow:hidden;margin-bottom:2px;}
.b-hp-fill{height:100%;border-radius:100px;background:linear-gradient(90deg,#2ed573,#7bed9f);transition:width 0.5s ease;}
.b-hp-fill.low{background:linear-gradient(90deg,#ff4757,#ff6b81);}
.b-hp-fill.mid{background:linear-gradient(90deg,#ff9800,#ffd32a);}
.b-hp-fill.monster-bar{background:linear-gradient(90deg,#ff4757,#c0392b);}
.b-hp-val{font-size:0.6rem;color:var(--muted);}
.b-level{font-size:0.6rem;color:var(--muted);margin-top:2px;}

/* arena */
.battle-arena{flex:1;position:relative;display:flex;align-items:flex-end;justify-content:space-between;padding:0 40px 80px;}

/* sprites */
.b-sprite{font-size:4.5rem;position:relative;text-align:center;user-select:none;transition:transform 0.3s;}
.b-sprite.hero-sprite{transform-origin:bottom center;}
.b-sprite.monster-sprite{transform-origin:bottom center;transform:scaleX(-1);}
.b-sprite.attack-anim{animation:heroAtk 0.5s ease;}
.b-sprite.hurt-anim{animation:spriteHurt 0.4s ease;}
.b-sprite.dead-anim{animation:spriteDead 0.6s ease forwards;}
@keyframes heroAtk{0%{transform:translateX(0)}40%{transform:translateX(60px)}70%{transform:translateX(30px)}100%{transform:translateX(0)}}
@keyframes monsterAtk{0%{transform:scaleX(-1) translateX(0)}40%{transform:scaleX(-1) translateX(60px)}70%{transform:scaleX(-1) translateX(30px)}100%{transform:scaleX(-1) translateX(0)}}
@keyframes spriteHurt{0%{filter:brightness(1)}30%{filter:brightness(3) sepia(1) hue-rotate(300deg)}100%{filter:brightness(1)}}
@keyframes spriteDead{0%{transform:scaleX(-1) rotate(0) opacity(1)}100%{transform:scaleX(-1) rotate(90deg);opacity:0;}}
@keyframes heroDeadAnim{0%{transform:rotate(0);opacity:1;}100%{transform:rotate(-90deg);opacity:0;}}

/* damage number */
.dmg-num{position:absolute;font-size:1.4rem;font-weight:900;pointer-events:none;z-index:10;animation:dmgFloat 1s ease forwards;}
.dmg-num.hero-dmg{color:#ff4757;left:30px;}
.dmg-num.monster-dmg{color:#f5c518;right:30px;}
.dmg-num.heal{color:#2ed573;}
@keyframes dmgFloat{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(-60px);opacity:0;}}

/* battle log */
.battle-log{position:relative;z-index:2;background:rgba(0,0,0,0.6);border-top:1px solid rgba(255,255,255,0.08);padding:10px 16px;min-height:56px;font-size:0.85rem;font-weight:700;color:var(--text);text-align:center;}
.battle-log .log-line{opacity:0;animation:logFade 0.4s ease forwards;}
@keyframes logFade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* battle result */
.battle-result{display:none;position:absolute;inset:0;background:rgba(0,0,0,0.85);z-index:10;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
.battle-result.show{display:flex;animation:fadeIn 0.4s ease;}
.result-emoji{font-size:4rem;margin-bottom:8px;animation:bounce 1s ease infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.result-title{font-size:1.8rem;font-weight:900;margin-bottom:6px;}
.result-title.win{color:var(--gold);}
.result-title.lose{color:var(--red);}
.result-rewards{background:var(--card);border-radius:14px;padding:12px 20px;margin:10px 0 16px;font-size:0.85rem;color:var(--muted);}
.result-rewards b{color:var(--gold);}

/* ── SHOP ── */
.shop-header{font-size:1.5rem;font-weight:900;color:var(--gold);margin-bottom:4px;}
.shop-coins{display:flex;align-items:center;gap:6px;margin-bottom:14px;font-size:1rem;font-weight:700;color:var(--gold);}
.shop-section{font-size:0.72rem;color:var(--purple);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin:10px 0 5px;width:100%;}
.shop-items{display:flex;flex-direction:column;gap:7px;width:100%;max-width:360px;}
.shop-item{background:var(--card);border:1px solid rgba(255,255,255,0.08);border-radius:13px;padding:10px 12px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all 0.15s;}
.shop-item:active{transform:scale(0.97);}
.shop-item.owned{border-color:var(--green);opacity:0.7;}
.shop-item.equipped-item{border-color:var(--gold);}
.shop-item-icon{font-size:1.8rem;min-width:34px;text-align:center;}
.shop-item-info{flex:1;}
.shop-item-name{font-size:0.85rem;font-weight:900;}
.shop-item-desc{font-size:0.6rem;color:var(--muted);margin-top:1px;}
.shop-item-stat{font-size:0.65rem;color:var(--green);margin-top:1px;}
.shop-price{display:flex;align-items:center;gap:3px;font-size:0.85rem;font-weight:900;color:var(--gold);flex-shrink:0;}
.shop-price.owned-label{color:var(--green);font-size:0.75rem;}
.back-btn{background:rgba(255,255,255,0.08);border:none;border-radius:100px;color:var(--text);font-family:'Nunito',sans-serif;font-size:0.85rem;font-weight:700;padding:9px 22px;cursor:pointer;margin-top:14px;}
.shop-scroll{overflow-y:auto;width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;padding-bottom:20px;}
</style>
</head>
<body>

<!-- ══ TITLE ══ -->
<div class="screen active" id="screenTitle">
  <div class="title-hero">⚔️🧙🏰</div>
  <div class="title-main">たしざんクエスト</div>
  <div class="title-sub">といてたたかってつよくなれ！</div>
  <div id="saveSlots" style="width:100%;max-width:300px;margin-bottom:8px;"></div>
  <button class="big-btn" onclick="showScreen('screenCharSelect')">あたらしくはじめる</button>
</div>
<!-- save toast -->
<div class="save-toast" id="saveToast">💾 セーブした！</div>

<!-- ══ CHAR SELECT ══ -->
<div class="screen" id="screenCharSelect">
  <div style="font-size:1.3rem;font-weight:900;color:var(--gold);margin-bottom:4px;">キャラをえらぼう！</div>
  <div style="color:var(--muted);font-size:0.8rem;margin-bottom:8px;">どのゆうしゃになる？</div>
  <div class="char-grid" id="charGrid"></div>
  <button class="big-btn" id="startBtn" onclick="startGame()" style="opacity:0.4;pointer-events:none;">このキャラではじめる！</button>
</div>

<!-- ══ LEVEL UP OVERLAY ══ -->
<div class="overlay" id="lvupOverlay">
  <div class="overlay-box">
    <div class="lvup-emoji">🌟</div>
    <div class="lvup-title" id="lvupTitle">レベルアップ！</div>
    <div class="lvup-desc" id="lvupDesc"></div>
    <div class="lvup-stats" id="lvupStats"></div>
    <button class="big-btn" onclick="closeLvup()">つぎへ！</button>
  </div>
</div>

<!-- ══ BATTLE SCREEN ══ -->
<div class="battle-screen" id="battleScreen">
  <div class="battle-topbar">
    <!-- Hero stats -->
    <div class="b-stat-box">
      <div class="b-name hero" id="bHeroName">ゆうしゃ Lv.1</div>
      <div class="b-hp-track"><div class="b-hp-fill" id="bHeroHpBar" style="width:100%"></div></div>
      <div class="b-hp-val" id="bHeroHpVal">20/20</div>
      <div class="b-level" id="bHeroStats">⚔️5 🛡️2</div>
    </div>
    <!-- Monster stats -->
    <div class="b-stat-box" style="text-align:right;">
      <div class="b-name monster" id="bMonName">スライム</div>
      <div class="b-hp-track"><div class="b-hp-fill monster-bar" id="bMonHpBar" style="width:100%"></div></div>
      <div class="b-hp-val" id="bMonHpVal">15/15</div>
      <div class="b-level" id="bMonLevel">モンスター Lv.1</div>
    </div>
  </div>

  <!-- Arena -->
  <div class="battle-arena">
    <div id="heroSprite" class="b-sprite hero-sprite">🧙‍♂️</div>
    <div id="monsterSprite" class="b-sprite monster-sprite">🟢</div>
  </div>

  <div class="battle-ground"></div>
  <div class="battle-log" id="battleLog"><span class="log-line">たたかいがはじまった！</span></div>

  <!-- Battle result -->
  <div class="battle-result" id="battleResult">
    <div class="result-emoji" id="resultEmoji">🎉</div>
    <div class="result-title" id="resultTitle">かった！</div>
    <div class="result-rewards" id="resultRewards"></div>
    <button class="big-btn" onclick="closeBattle()">もどる</button>
  </div>
</div>

<!-- ══ SHOP SCREEN ══ -->
<div class="screen" id="screenShop">
  <div class="shop-header">⚔️ ショップ</div>
  <div class="shop-coins" id="shopCoinRow"></div>
  <div class="shop-scroll">
    <div class="shop-section">⚔️ ぶき</div>
    <div class="shop-items" id="shopWeapons"></div>
    <div class="shop-section">🛡️ ぼうぐ</div>
    <div class="shop-items" id="shopArmors"></div>
  </div>
  <button class="back-btn" onclick="closeShop()">← もどる</button>
</div>

<!-- ══ MAIN GAME ══ -->
<div class="game-wrap" id="gameWrap" style="display:none;">
  <div class="topbar">
    <div class="coin-pill">
      <svg width="18" height="18" viewBox="0 0 28 28"><defs><radialGradient id="cg0" cx="35%" cy="35%"><stop offset="0%" stop-color="#ffe066"/><stop offset="60%" stop-color="#e6a817"/><stop offset="100%" stop-color="#b8860b"/></radialGradient></defs><circle cx="14" cy="14" r="13" fill="url(#cg0)" stroke="#c8860a" stroke-width="1.5"/><circle cx="14" cy="14" r="9" fill="none" stroke="rgba(255,220,80,0.5)" stroke-width="1.5"/><text x="14" y="18" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a5500" font-family="sans-serif">G</text></svg>
      <span id="coinDisplay">0</span>
    </div>
    <div class="battle-btn-wrap">
      <button class="shop-btn" onclick="openShop()">🛒 みせ</button>
      <button class="battle-start-btn" onclick="openBattle()">⚔️ たたかう</button>
      <button class="shop-btn" style="background:linear-gradient(135deg,#2ed573,#1e9950);" onclick="saveGame()">💾</button>
    </div>
  </div>

  <div class="char-panel">
    <div class="char-avatar" id="charAvatar">⚔️</div>
    <div class="char-info">
      <div class="char-info-name" id="charInfoName">ゆうしゃ Lv.1</div>
      <div class="equipped-row" id="equippedRow"></div>
      <div class="bar-row"><div class="bar-label">HP</div><div class="bar-track"><div class="bar-fill hp" id="hpBar" style="width:100%"></div></div><div class="bar-val" id="hpVal">20/20</div></div>
      <div class="bar-row"><div class="bar-label">EXP</div><div class="bar-track"><div class="bar-fill exp" id="expBar" style="width:0%"></div></div><div class="bar-val" id="expVal">0/10</div></div>
      <div class="stat-row">
        <div class="stat-pill">⚔️ <b id="statAtk">5</b></div>
        <div class="stat-pill">🛡️ <b id="statDef">2</b></div>
        <div class="stat-pill">🔥 <b id="statStreak">x0</b></div>
      </div>
    </div>
  </div>

  <div class="level-badge"><span id="levelLabel">レベル1：1〜5のたしざん</span></div>

  <div class="question-card">
    <div class="emoji-row" id="emojiRow"></div>
    <div class="question-num" id="question">？＋？＝？</div>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="answers">
    <button class="ans-btn" onclick="answer(0)">0</button>
    <button class="ans-btn" onclick="answer(1)">0</button>
    <button class="ans-btn" onclick="answer(2)">0</button>
    <button class="ans-btn" onclick="answer(3)">0</button>
  </div>
</div>

<script>
// ══ MASTER DATA ══
const CHARACTERS=[
  {id:'warrior',name:'せんし',emoji:'🧙‍♂️',desc:'バランスがいい',baseAtk:6,baseDef:4,baseHp:24,expRate:1.0},
  {id:'mage',   name:'まほうつかい',emoji:'🧝',desc:'こうげきりょく↑',baseAtk:9,baseDef:2,baseHp:18,expRate:1.1},
  {id:'knight', name:'きし',emoji:'🦸',desc:'ぼうぐりょく↑',baseAtk:4,baseDef:7,baseHp:28,expRate:0.9},
];
const WEAPONS=[
  {id:'stick', name:'きのぼう',   emoji:'🪵',price:0, atk:0, starter:true,desc:'さいしょのぶき'},
  {id:'sword', name:'てつのつるぎ',emoji:'⚔️',price:15,atk:4, desc:'こうげき +4'},
  {id:'axe',   name:'せんとうおの',emoji:'🪓',price:30,atk:8, desc:'こうげき +8'},
  {id:'spear', name:'みずのやり', emoji:'🔱',price:55,atk:13,desc:'こうげき +13'},
  {id:'bow',   name:'まほうのゆみ',emoji:'🏹',price:90,atk:20,desc:'こうげき +20'},
];
const ARMORS=[
  {id:'rags',   name:'ぬののふく',  emoji:'👕',price:0, def:0, starter:true,desc:'さいしょのぼうぐ'},
  {id:'leather',name:'かわのよろい', emoji:'🦺',price:12,def:3, desc:'ぼうぐ +3'},
  {id:'chain',  name:'くさりかたびら',emoji:'🥋',price:28,def:6, desc:'ぼうぐ +6'},
  {id:'plate',  name:'てつのよろい', emoji:'🛡️',price:50,def:11,desc:'ぼうぐ +11'},
  {id:'dragon', name:'りゅうのよろい',emoji:'🐉',price:85,def:18,desc:'ぼうぐ +18'},
];
const MONSTERS=[
  {id:'slime',   name:'スライム',   emoji:'🟢',lv:1, hp:12, atk:3, def:1, exp:4, gold:3},
  {id:'goblin',  name:'ゴブリン',   emoji:'👺',lv:2, hp:18, atk:5, def:2, exp:6, gold:5},
  {id:'bat',     name:'おおこうもり',emoji:'🦇',lv:3, hp:22, atk:7, def:2, exp:8, gold:7},
  {id:'skeleton',name:'スケルトン', emoji:'💀',lv:4, hp:30, atk:9, def:4, exp:11,gold:9},
  {id:'orc',     name:'オーク',     emoji:'👹',lv:5, hp:38, atk:12,def:6, exp:14,gold:12},
  {id:'witch',   name:'まじょ',     emoji:'🧟',lv:6, hp:45, atk:15,def:7, exp:18,gold:16},
  {id:'golem',   name:'ゴーレム',   emoji:'🗿',lv:7, hp:55, atk:18,def:10,exp:22,gold:20},
  {id:'dragon',  name:'ドラゴン',   emoji:'🐲',lv:8, hp:70, atk:24,def:12,exp:30,gold:28},
];
const LEVEL_CONFIG=[
  {label:'レベル1：1〜5のたしざん', aMax:5, bMax:4,time:15},
  {label:'レベル2：1〜9のたしざん', aMax:8, bMax:8,time:12},
  {label:'レベル3：10までのたしざん',aMax:9, bMax:9,time:10},
  {label:'レベル4：2けた+1けた',   aMax:15,bMax:9,time:9},
  {label:'レベル5：おおきいかず！', aMax:20,bMax:20,time:7},
];
const EMOJIS=['🎂','🍎','⭐','🐶','🚗'];

// ── STATE ──
let coins=0,streak=0,answered=false,correctAnswer=0;
let quizLevel=1;
let charTemplate=null;
let hero={name:'',emoji:'',lv:1,exp:0,expNext:10,hp:20,hpMax:20,atk:5,def:2,weapon:'stick',armor:'rags',owned:{weapons:['stick'],armors:['rags']},charId:'warrior',expRate:1.0};
let lvupQueue=[];

function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function getLvCfg(){return LEVEL_CONFIG[Math.min(quizLevel-1,LEVEL_CONFIG.length-1)];}
function getEmoji(){return EMOJIS[Math.min(quizLevel-1,EMOJIS.length-1)];}
function coinSVG(s=18){return `<svg width="${s}" height="${s}" viewBox="0 0 28 28"><defs><radialGradient id="cgi" cx="35%" cy="35%"><stop offset="0%" stop-color="#ffe066"/><stop offset="60%" stop-color="#e6a817"/><stop offset="100%" stop-color="#b8860b"/></radialGradient></defs><circle cx="14" cy="14" r="13" fill="url(#cgi)" stroke="#c8860a" stroke-width="1.5"/><circle cx="14" cy="14" r="9" fill="none" stroke="rgba(255,220,80,0.5)" stroke-width="1.5"/><text x="14" y="18" text-anchor="middle" font-size="9" font-weight="bold" fill="#7a5500" font-family="sans-serif">G</text></svg>`;}

// ── SCREEN CONTROL ──
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  const el=document.getElementById(id);
  if(el) el.classList.add('active');
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('battleScreen').classList.remove('active');
}
function showGame(){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('gameWrap').style.display='block';
  document.getElementById('battleScreen').classList.remove('active');
}

// ── CHAR SELECT ──
(function(){
  const grid=document.getElementById('charGrid');
  CHARACTERS.forEach(c=>{
    const d=document.createElement('div');
    d.className='char-card';
    d.innerHTML=`<div class="char-emoji">${c.emoji}</div><div class="char-name">${c.name}</div><div class="char-desc">${c.desc}</div>`;
    d.onclick=()=>{
      document.querySelectorAll('.char-card').forEach(x=>x.classList.remove('selected'));
      d.classList.add('selected');charTemplate=c;
      const b=document.getElementById('startBtn');b.style.opacity='1';b.style.pointerEvents='auto';
    };
    grid.appendChild(d);
  });
})();

function startGame(){
  if(!charTemplate)return;
  const c=charTemplate;
  hero={name:c.name,emoji:c.emoji,lv:1,exp:0,expNext:10,hp:c.baseHp,hpMax:c.baseHp,atk:c.baseAtk,def:c.baseDef,weapon:'stick',armor:'rags',owned:{weapons:['stick'],armors:['rags']},charId:c.id,expRate:c.expRate};
  coins=0;streak=0;quizLevel=1;
  updateHeroUI();showGame();generateQuestion();
}

// ── HERO UI ──
function heroTotalAtk(){return hero.atk+(WEAPONS.find(w=>w.id===hero.weapon).atk);}
function heroTotalDef(){return hero.def+(ARMORS.find(a=>a.id===hero.armor).def);}
function updateHeroUI(){
  document.getElementById('charAvatar').textContent=hero.emoji;
  document.getElementById('charInfoName').textContent=`${hero.name}  Lv.${hero.lv}`;
  const wep=WEAPONS.find(w=>w.id===hero.weapon);
  const arm=ARMORS.find(a=>a.id===hero.armor);
  document.getElementById('equippedRow').innerHTML=
    `<div class="equipped-tag">${wep.emoji} <span>${wep.name}</span></div>`+
    `<div class="equipped-tag">${arm.emoji} <span>${arm.name}</span></div>`;
  document.getElementById('hpBar').style.width=Math.max(0,(hero.hp/hero.hpMax*100))+'%';
  document.getElementById('hpVal').textContent=`${hero.hp}/${hero.hpMax}`;
  document.getElementById('expBar').style.width=(hero.exp/hero.expNext*100)+'%';
  document.getElementById('expVal').textContent=`${hero.exp}/${hero.expNext}`;
  document.getElementById('statAtk').textContent=heroTotalAtk();
  document.getElementById('statDef').textContent=heroTotalDef();
  document.getElementById('statStreak').textContent='x'+streak;
  document.getElementById('coinDisplay').textContent=coins;
}

// ── QUIZ ──
function generateQuestion(){
  answered=false;
  const cfg=getLvCfg();
  const a=randInt(1,cfg.aMax),b=randInt(1,cfg.bMax);
  correctAnswer=a+b;
  const em=getEmoji();
  const row=document.getElementById('emojiRow');
  if(a>10||b>10){
    row.innerHTML=`<span style="font-size:1.6rem">${em}</span><span class="plus-sign">+</span><span style="font-size:1.6rem">${em}</span>`;
  } else {
    let hA='<div class="emoji-group">';for(let i=0;i<a;i++)hA+=`<span class="emoji-item">${em}</span>`;hA+='</div>';
    let hB='<div class="emoji-group">';for(let i=0;i<b;i++)hB+=`<span class="emoji-item">${em}</span>`;hB+='</div>';
    row.innerHTML=hA+'<span class="plus-sign">+</span>'+hB;
  }
  document.getElementById('question').innerHTML=`<span class="num">${a}</span> ＋ <span class="num">${b}</span> ＝ ？`;
  const opts=new Set([correctAnswer]);let att=0;
  while(opts.size<4&&att<200){att++;const d=randInt(1,5)*(Math.random()<0.5?1:-1);const w=correctAnswer+d;if(w>0)opts.add(w);}
  const arr=[...opts].sort(()=>Math.random()-0.5);
  const btns=document.querySelectorAll('.ans-btn');
  arr.forEach((v,i)=>{btns[i].textContent=v;btns[i].className='ans-btn';btns[i].disabled=false;});
  document.getElementById('feedback').textContent='';
  document.getElementById('feedback').className='feedback';
  document.getElementById('levelLabel').textContent=cfg.label;
}

function timeUp(){}
function answer(idx){
  if(answered)return;answered=true;
  const btns=document.querySelectorAll('.ans-btn');
  const chosen=parseInt(btns[idx].textContent);
  if(chosen===correctAnswer){
    btns[idx].classList.add('correct');streak++;
    const sBonus=streak>=5?3:streak>=3?2:0;
    const earned=1+sBonus;coins+=earned;
    const expGain=Math.ceil((1)*hero.expRate);hero.exp+=expGain;
    if(streak%5===0&&hero.hp<hero.hpMax) hero.hp=Math.min(hero.hpMax,hero.hp+3);
    let msg=streak>=5?`🔥 ${streak}れんぞく！ +${earned}G`:`⭕ せいかい！ +${earned}G +${expGain}EXP`;
    showFeedback(msg,'correct');spawnCoin(earned,btns[idx]);
    checkHeroLevelUp();
    if(hero.lv>quizLevel&&quizLevel<5) quizLevel=Math.min(5,hero.lv);
    updateHeroUI();
    triggerAutoSave();
    setTimeout(generateQuestion,1000);
  } else {
    btns[idx].classList.add('wrong');streak=0;
    const dmg=Math.max(1,4-Math.floor(heroTotalDef()/3));
    hero.hp=Math.max(0,hero.hp-dmg);
    showFeedback(`❌ ちがうよ！ -${dmg}HP`,'wrong');
    highlightCorrect();updateHeroUI();
    setTimeout(generateQuestion,1400);
  }
}
function highlightCorrect(){document.querySelectorAll('.ans-btn').forEach(b=>{if(parseInt(b.textContent)===correctAnswer)b.classList.add('correct');b.disabled=true;});}
function showFeedback(msg,type){const el=document.getElementById('feedback');el.textContent=msg;el.className=`feedback ${type}`;}
function spawnCoin(n,btn){
  const rect=btn?btn.getBoundingClientRect():{left:160,top:300};
  for(let i=0;i<Math.min(n,3);i++){
    setTimeout(()=>{const el=document.createElement('div');el.className='coin-pop';el.innerHTML=coinSVG(24);el.style.left=(rect.left+rect.width/2-12+(Math.random()-.5)*26)+'px';el.style.top=(rect.top+rect.height/2-12+window.scrollY)+'px';document.body.appendChild(el);setTimeout(()=>el.remove(),950);},i*160);
  }
}

// ── LEVEL UP ──
function checkHeroLevelUp(){
  while(hero.exp>=hero.expNext){
    hero.exp-=hero.expNext;hero.lv++;
    hero.expNext=Math.floor(hero.expNext*1.4);
    const c=CHARACTERS.find(x=>x.id===hero.charId);
    const ag=c.id==='mage'?3:c.id==='knight'?1:2;
    const dg=c.id==='knight'?3:c.id==='mage'?1:2;
    const hg=c.id==='knight'?5:c.id==='mage'?3:4;
    hero.atk+=ag;hero.def+=dg;hero.hpMax+=hg;hero.hp=hero.hpMax;
    lvupQueue.push({ag,dg,hg});
  }
  if(lvupQueue.length===1) displayNextLvup();
}
function displayNextLvup(){
  if(!lvupQueue.length)return;
  const{ag,dg,hg}=lvupQueue[0];
  document.getElementById('lvupTitle').textContent=`レベル ${hero.lv} にアップ！`;
  document.getElementById('lvupDesc').textContent='キャラがつよくなったよ！HPもかいふく！';
  document.getElementById('lvupStats').innerHTML=`<div class="lvup-stat"><b>+${ag}</b>こうげき</div><div class="lvup-stat"><b>+${dg}</b>ぼうぐ</div><div class="lvup-stat"><b>+${hg}</b>HP</div>`;
  document.getElementById('lvupOverlay').classList.add('show');
  
}
function closeLvup(){
  document.getElementById('lvupOverlay').classList.remove('show');
  lvupQueue.shift();
  if(lvupQueue.length){setTimeout(displayNextLvup,200);return;}
  generateQuestion();
}

// ═══════════════════════════════
// ── BATTLE SYSTEM ──
// ═══════════════════════════════
let battleMon=null,battleHeroHp=0,battleMonHp=0,battleTurn=0,battleRunning=false,battleTimeout=null;

function openBattle(){
  
  // pick monster based on hero level
  const idx=Math.min(hero.lv-1,MONSTERS.length-1);
  // random ±1
  const pick=Math.max(0,Math.min(MONSTERS.length-1,idx+randInt(-1,1)));
  battleMon={...MONSTERS[pick]};
  // scale monster to hero level
  const scale=1+hero.lv*0.15;
  battleMon.hp=Math.round(battleMon.hp*scale);
  battleMon.atk=Math.round(battleMon.atk*scale);
  battleMon.def=Math.round(battleMon.def*scale);
  battleMon.exp=Math.round(battleMon.exp*scale);
  battleMon.gold=Math.round(battleMon.gold*scale);

  battleHeroHp=hero.hp;
  battleMonHp=battleMon.hp;
  battleTurn=0;
  battleRunning=true;

  // setup UI
  document.getElementById('heroSprite').textContent=hero.emoji;
  document.getElementById('monsterSprite').textContent=battleMon.emoji;
  document.getElementById('monsterSprite').style.animation='';
  document.getElementById('heroSprite').style.animation='';
  document.getElementById('monsterSprite').style.opacity='1';
  document.getElementById('heroSprite').style.opacity='1';
  document.getElementById('monsterSprite').className='b-sprite monster-sprite';
  document.getElementById('heroSprite').className='b-sprite hero-sprite';
  document.getElementById('battleResult').classList.remove('show');

  document.getElementById('bHeroName').textContent=`${hero.name} Lv.${hero.lv}`;
  document.getElementById('bHeroStats').textContent=`⚔️${heroTotalAtk()} 🛡️${heroTotalDef()}`;
  document.getElementById('bMonName').textContent=battleMon.name;
  document.getElementById('bMonLevel').textContent=`モンスター Lv.${battleMon.lv}`;

  updateBattleHpBars();

  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('gameWrap').style.display='none';
  document.getElementById('battleScreen').classList.add('active');

  setBattleLog(`${battleMon.name}があらわれた！`);
  setTimeout(()=>runBattleTurn(),1200);
}

function updateBattleHpBars(){
  const hPct=Math.max(0,battleHeroHp/hero.hpMax*100);
  const mPct=Math.max(0,battleMonHp/battleMon.hp*100);
  const hBar=document.getElementById('bHeroHpBar');
  hBar.style.width=hPct+'%';
  hBar.className='b-hp-fill'+(hPct<30?' low':hPct<60?' mid':'');
  document.getElementById('bHeroHpVal').textContent=`${Math.max(0,battleHeroHp)}/${hero.hpMax}`;
  document.getElementById('bMonHpBar').style.width=mPct+'%';
  document.getElementById('bMonHpVal').textContent=`${Math.max(0,battleMonHp)}/${battleMon.hp}`;
}

function setBattleLog(msg){
  const log=document.getElementById('battleLog');
  log.innerHTML=`<span class="log-line">${msg}</span>`;
}

function spawnBattleDmg(amount,isHero,isHeal){
  const arena=document.querySelector('.battle-arena');
  const el=document.createElement('div');
  el.className='dmg-num'+(isHero?' hero-dmg':' monster-dmg')+(isHeal?' heal':'');
  el.textContent=(isHeal?'+':'-')+amount+(isHeal?' HP':'');
  el.style.top='40%';
  arena.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

function runBattleTurn(){
  if(!battleRunning) return;
  battleTurn++;

  // Hero attacks
  const hAtk=heroTotalAtk();
  const heroDmg=Math.max(1,hAtk-battleMon.def+randInt(-2,3));
  battleMonHp-=heroDmg;

  const heroSprite=document.getElementById('heroSprite');
  const monSprite=document.getElementById('monsterSprite');

  // Hero attack animation
  heroSprite.style.animation='none';
  void heroSprite.offsetWidth;
  heroSprite.style.animation='heroAtk 0.5s ease';
  setTimeout(()=>{
    monSprite.style.animation='none';
    void monSprite.offsetWidth;
    monSprite.style.animation='spriteHurt 0.4s ease';
    spawnBattleDmg(heroDmg,false,false);
    updateBattleHpBars();

    if(battleMonHp<=0){
      // Monster dead
      setTimeout(()=>{
        monSprite.style.animation='none';
        void monSprite.offsetWidth;
        monSprite.style.animation='spriteDead 0.6s ease forwards';
        setBattleLog(`${battleMon.name}をたおした！🎉`);
        setTimeout(()=>battleWin(),900);
      },400);
      return;
    }

    // Monster's turn — show intermediate log
    setBattleLog(`${hero.name}のこうげき！ ${battleMon.name}に ${heroDmg} のダメージ！`);

    setTimeout(()=>{
      if(!battleRunning) return;
      // Monster attacks
      const mAtk=battleMon.atk;
      const monDmg=Math.max(1,mAtk-heroTotalDef()+randInt(-1,3));
      battleHeroHp-=monDmg;

      monSprite.style.animation='none';
      void monSprite.offsetWidth;
      monSprite.style.animation='monsterAtk 0.5s ease';
      setTimeout(()=>{
        heroSprite.style.animation='none';
        void heroSprite.offsetWidth;
        heroSprite.style.animation='spriteHurt 0.4s ease';
        spawnBattleDmg(monDmg,true,false);
        updateBattleHpBars();

        if(battleHeroHp<=0){
          // Hero dead
          setTimeout(()=>{
            heroSprite.style.animation='heroDeadAnim 0.6s ease forwards';
            setBattleLog(`${hero.name}はたおれた…😢`);
            setTimeout(()=>battleLose(),900);
          },400);
          return;
        }

        setBattleLog(`${battleMon.name}のこうげき！ ${hero.name}に ${monDmg} のダメージ！`);

        // Continue battle (max 20 turns)
        if(battleTurn>=20){
          setTimeout(()=>{setBattleLog('じかんぎれ！ひきわけ！');setTimeout(()=>battleDraw(),800);},600);
        } else {
          setTimeout(()=>runBattleTurn(),1400);
        }
      },300);
    },700);
  },300);
}

function battleWin(){
  battleRunning=false;
  hero.hp=Math.max(1,battleHeroHp); // carry over HP
  hero.exp+=battleMon.exp;
  coins+=battleMon.gold;
  checkHeroLevelUp();
  updateHeroUI();
  document.getElementById('resultEmoji').textContent='🏆';
  document.getElementById('resultTitle').textContent='かった！';document.getElementById('resultTitle').className='result-title win';
  document.getElementById('resultRewards').innerHTML=`+<b>${battleMon.exp}</b> EXP　　+<b>${battleMon.gold}</b> G<br>のこりHP：<b>${Math.max(1,battleHeroHp)}</b>`;
  document.getElementById('battleResult').classList.add('show');
}
function battleLose(){
  battleRunning=false;
  hero.hp=Math.max(1,Math.floor(hero.hpMax*0.3)); // revive at 30%
  updateHeroUI();
  document.getElementById('resultEmoji').textContent='💀';
  document.getElementById('resultTitle').textContent='まけた…';document.getElementById('resultTitle').className='result-title lose';
  document.getElementById('resultRewards').innerHTML=`HP が <b>${hero.hp}</b> までかいふくしたよ。<br>もっとつよくなってリベンジしよう！`;
  document.getElementById('battleResult').classList.add('show');
}
function battleDraw(){
  battleRunning=false;
  hero.hp=Math.max(1,battleHeroHp);
  updateHeroUI();
  document.getElementById('resultEmoji').textContent='⚖️';
  document.getElementById('resultTitle').textContent='ひきわけ！';document.getElementById('resultTitle').className='result-title win';
  document.getElementById('resultRewards').innerHTML=`ちょうどいいたたかいだったね！`;
  document.getElementById('battleResult').classList.add('show');
}
function closeBattle(){
  document.getElementById('battleScreen').classList.remove('active');
  showGame();
  generateQuestion();
}

// ── SHOP ──
function openShop(){
  
  document.getElementById('shopCoinRow').innerHTML=coinSVG(20)+`<span>${coins}</span> コイン`;
  buildShop();showScreen('screenShop');
}
function closeShop(){showGame();generateQuestion();}
function buildShop(){
  renderShopItems('shopWeapons',WEAPONS,'weapon');
  renderShopItems('shopArmors',ARMORS,'armor');
}
function renderShopItems(cid,items,type){
  const wrap=document.getElementById(cid);wrap.innerHTML='';
  items.filter(i=>!i.starter).forEach(item=>{
    const owned=type==='weapon'?hero.owned.weapons.includes(item.id):hero.owned.armors.includes(item.id);
    const equipped=(type==='weapon'?hero.weapon:hero.armor)===item.id;
    const div=document.createElement('div');
    div.className='shop-item'+(equipped?' equipped-item':owned?' owned':'');
    const statLbl=type==='weapon'?`⚔️ こうげき +${item.atk}`:`🛡️ ぼうぐ +${item.def}`;
    const priceArea=equipped?`<span class="shop-price owned-label">そうびちゅう</span>`:owned?`<span class="shop-price owned-label">そうびする</span>`:`<div class="shop-price">${coinSVG(16)}<span>${item.price}</span></div>`;
    div.innerHTML=`<div class="shop-item-icon">${item.emoji}</div><div class="shop-item-info"><div class="shop-item-name">${item.name}</div><div class="shop-item-desc">${item.desc}</div><div class="shop-item-stat">${statLbl}</div></div>${priceArea}`;
    if(!owned&&!equipped) div.onclick=()=>buyItem(type,item);
    else if(owned&&!equipped) div.onclick=()=>equipItem(type,item.id);
    wrap.appendChild(div);
  });
}
function buyItem(type,item){
  if(coins<item.price){showFeedback('コインがたりない！','wrong');return;}
  coins-=item.price;
  if(type==='weapon') hero.owned.weapons.push(item.id);
  else hero.owned.armors.push(item.id);
  equipItem(type,item.id);
}
function equipItem(type,id){
  if(type==='weapon') hero.weapon=id;
  else hero.armor=id;
  document.getElementById('shopCoinRow').innerHTML=coinSVG(20)+`<span>${coins}</span> コイン`;
  buildShop();updateHeroUI();
}

// ══ SAVE / LOAD ══
const SAVE_KEY = 'tashizan_save';

function saveGame(){
  const data = {
    hero: hero,
    coins: coins,
    quizLevel: quizLevel,
    savedAt: new Date().toLocaleString('ja-JP',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    showSaveToast();
  } catch(e) {
    alert('セーブできなかった…');
  }
}

function loadSave(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    loadGame(JSON.parse(raw));
  } catch(e){ alert('よみこめなかった…'); }
}
function loadGame(data){
  hero = data.hero;
  coins = data.coins;
  quizLevel = data.quizLevel || 1;
  streak = 0;
  updateHeroUI();
  showGame();
  generateQuestion();
}

function deleteSave(){
  if(!confirm('セーブデータをけす？')) return;
  localStorage.removeItem(SAVE_KEY);
  renderSaveSlots();
}

function renderSaveSlots(){
  const wrap = document.getElementById('saveSlots');
  if(!wrap) return;
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw){ wrap.innerHTML=''; return; }
    const data = JSON.parse(raw);
    const h = data.hero;
    const wep = WEAPONS.find(w=>w.id===h.weapon)||WEAPONS[0];
    const arm = ARMORS.find(a=>a.id===h.armor)||ARMORS[0];
    wrap.innerHTML = `
      <div class="save-card" style="flex-direction:column;text-align:center;">
        <div class="save-card-avatar" style="font-size:2.8rem;margin-bottom:4px;">${h.emoji}</div>
        <div class="save-card-info" style="width:100%;margin-bottom:6px;">
          <div class="save-card-name">${h.name}  Lv.${h.lv}</div>
          <div class="save-card-detail">${wep.emoji}${wep.name}　${arm.emoji}${arm.name}</div>
          <div class="save-card-detail">コイン:${data.coins}　HP:${h.hp}/${h.hpMax}</div>
          <div class="save-card-detail" style="color:#555">${data.savedAt||''}</div>
        </div>
        <div class="save-card-btns">
          <button class="big-btn" style="margin:3px 0;padding:10px 16px;font-size:0.9rem;" onclick="loadSave()">つづきから</button>
          <button class="big-btn red" style="margin:3px 0;padding:8px 16px;font-size:0.75rem;" onclick="deleteSave()">けす</button>
        </div>
      </div>`;
  } catch(e){ wrap.innerHTML=''; }
}

function showSaveToast(){
  const t = document.getElementById('saveToast');
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// auto-save on correct answer (piggyback updateHeroUI calls)
const _origUpdateHeroUI = updateHeroUI;
// auto-save every 5 correct answers
let _saveCounter = 0;
function triggerAutoSave(){
  _saveCounter++;
  if(_saveCounter%5===0) saveGame();
}

// Run on page load
window.addEventListener('load', ()=>{
  renderSaveSlots();
});
</script>
</body>
