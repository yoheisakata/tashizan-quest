<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌏</text></svg>">
<title>ちきゅうをまなぼう 🌏</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Hiragino Kaku Gothic Pro','Yu Gothic',sans-serif;}
#c{position:fixed;inset:0;display:block;}

/* ── TOP INFO ── */
#info{
  position:fixed;top:0;left:0;right:0;z-index:10;
  background:linear-gradient(180deg,rgba(0,5,25,0.92) 70%,transparent);
  padding:16px 16px 28px;text-align:center;pointer-events:none;
}
#mode-title{font-size:1.25rem;font-weight:900;color:#fff;text-shadow:0 0 20px rgba(100,200,255,0.7);margin-bottom:5px;}
#mode-desc{font-size:0.8rem;color:rgba(180,220,255,0.85);}

/* ── BOTTOM MODES ── */
#modes{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:linear-gradient(0deg,rgba(0,5,25,0.95) 70%,transparent);
  padding:10px 12px 18px;display:flex;gap:8px;justify-content:center;
}
.mode-btn{
  background:rgba(255,255,255,0.07);
  border:2px solid rgba(255,255,255,0.15);
  border-radius:14px;color:#ccc;
  font-family:inherit;font-size:0.78rem;font-weight:700;
  padding:9px 14px;cursor:pointer;text-align:center;
  line-height:1.45;transition:all 0.2s;min-width:76px;
}
.mode-btn:active{transform:scale(0.93);}
.mode-btn.active{
  background:rgba(80,160,255,0.22);
  border-color:rgba(100,180,255,0.7);
  color:#88ddff;
  box-shadow:0 0 14px rgba(80,160,255,0.25);
}

/* ── COUNTRY LABELS ── */
.clabel{
  position:fixed;z-index:10;pointer-events:none;
  font-size:0.85rem;font-weight:900;color:#fff;
  text-shadow:0 0 8px #000,0 0 16px #000;
  white-space:nowrap;display:flex;align-items:center;gap:5px;
  transition:opacity 0.25s;
}
.cdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}

/* ── DAY / NIGHT CARDS ── */
#dn-panel{
  position:fixed;left:50%;bottom:92px;transform:translateX(-50%);
  z-index:10;display:none;gap:14px;pointer-events:none;
}
#dn-panel.show{display:flex;}
.dn-card{
  background:rgba(0,5,30,0.88);
  border:1px solid rgba(255,255,255,0.18);
  border-radius:14px;padding:10px 14px;
  text-align:center;min-width:108px;
}
.dn-flag{font-size:1.8rem;margin-bottom:3px;}
.dn-name{font-size:0.65rem;color:rgba(180,220,255,0.75);margin-bottom:5px;}
.dn-status{font-size:1rem;font-weight:900;}
.dn-status.day{color:#FFD700;}
.dn-status.night{color:#89CFF0;}

/* ── FACT BUBBLE ── */
#fact{
  position:fixed;bottom:96px;left:50%;transform:translateX(-50%);
  z-index:10;max-width:340px;width:92%;
  background:rgba(0,8,40,0.88);
  border:1px solid rgba(100,180,255,0.35);
  border-radius:14px;padding:10px 14px;
  text-align:center;font-size:0.82rem;color:rgba(200,230,255,0.9);
  line-height:1.55;pointer-events:none;
}

/* ── PLAY BUTTON ── */
#play-btn{
  position:fixed;right:14px;top:50%;transform:translateY(-50%);
  z-index:10;
  background:rgba(255,210,50,0.18);
  border:2px solid rgba(255,210,50,0.55);
  border-radius:50%;width:54px;height:54px;
  font-size:1.4rem;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  color:#ffd700;transition:all 0.2s;
}
#play-btn.show{display:flex;}
#play-btn:active{transform:translateY(-50%) scale(0.9);}

/* ── MOON LABEL ── */
#moon-label{
  position:fixed;z-index:10;pointer-events:none;
  font-size:0.8rem;font-weight:700;color:rgba(210,240,255,0.85);
  text-shadow:0 0 8px #000;white-space:nowrap;display:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="info">
  <div id="mode-title">🌏 ちきゅうをまわそう</div>
  <div id="mode-desc">ゆびでさわって ちきゅうをまわしてみよう！</div>
</div>

<div id="japan-label" class="clabel" style="display:none">
  <div class="cdot" style="background:#ff6b6b;box-shadow:0 0 7px #ff6b6b"></div>🇯🇵 にほん
</div>
<div id="america-label" class="clabel" style="display:none">
  <div class="cdot" style="background:#6b9eff;box-shadow:0 0 7px #6b9eff"></div>🇺🇸 アメリカ
</div>
<div id="moon-label">🌕 つき</div>

<div id="dn-panel">
  <div class="dn-card">
    <div class="dn-flag">🇯🇵</div>
    <div class="dn-name">にほん（とうきょう）</div>
    <div class="dn-status day" id="dn-jp">☀️ ひる</div>
  </div>
  <div class="dn-card">
    <div class="dn-flag">🇺🇸</div>
    <div class="dn-name">アメリカ（ニューヨーク）</div>
    <div class="dn-status night" id="dn-us">🌙 よる</div>
  </div>
</div>

<button id="play-btn" onclick="togglePlay()">▶</button>

<div id="fact">👆 ゆびでさわって ちきゅうをまわしてみよう！</div>

<div id="modes">
  <button class="mode-btn active" id="btn-free"    onclick="setMode('free')">🌏<br>まわそう</button>
  <button class="mode-btn"        id="btn-daynight" onclick="setMode('daynight')">🌅<br>ひるとよる</button>
  <button class="mode-btn"        id="btn-moon"     onclick="setMode('moon')">🌕<br>つきと<br>ちきゅう</button>
  <button class="mode-btn"        id="btn-space"    onclick="setMode('space')">🚀<br>うちゅうへ</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ═══════════════════════════
//  RENDERER / SCENE / CAMERA
// ═══════════════════════════
const renderer = new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 2000);
camera.position.set(0,0,6);

// ═══════════════
//  STARS
// ═══════════════
(function(){
  const n=2500, pos=new Float32Array(n*3);
  for(let i=0;i<n*3;i++) pos[i]=(Math.random()-0.5)*800;
  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0xffffff,size:0.5,sizeAttenuation:true})));
})();

// ═══════════════════
//  EARTH TEXTURE
// ═══════════════════
function makeEarthTex(){
  const W=2048,H=1024;
  const cv=document.createElement('canvas');
  cv.width=W;cv.height=H;
  const c=cv.getContext('2d');

  // Deep ocean with depth variation
  const og=c.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#0a1f3e');og.addColorStop(0.25,'#0d3b7a');
  og.addColorStop(0.5,'#1565C0');og.addColorStop(0.75,'#0d3b7a');og.addColorStop(1,'#0a1f3e');
  c.fillStyle=og;c.fillRect(0,0,W,H);

  // Shallow water shimmer near coasts (light overlay)
  const sg=c.createRadialGradient(W*0.4,H*0.45,0,W*0.4,H*0.45,W*0.35);
  sg.addColorStop(0,'rgba(30,100,200,0)');sg.addColorStop(1,'rgba(10,40,100,0.3)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);

  function ll(lon,lat){return[(lon+180)/360*W,(90-lat)/180*H];}
  function poly(pts,col){
    c.fillStyle=col;c.beginPath();
    pts.forEach(([lon,lat],i)=>{const[x,y]=ll(lon,lat);i?c.lineTo(x,y):c.moveTo(x,y);});
    c.closePath();c.fill();
  }
  // Biome colors
  const FOREST='#2e7d32', LIGHT_FOREST='#388e3c', SAVANNA='#8bc34a',
        DESERT='#c8a96a', RED_DESERT='#a0785a', TUNDRA='#6a8f6a',
        ICE='#ddeeff', SNOW='#eef5ff', JUNGLE='#1b5e20', DRY='#9e9d24';

  // ── NORTH AMERICA ──
  poly([[-168,72],[-155,73],[-140,74],[-130,72],[-125,68],[-120,60],[-130,57],[-126,50],[-124,40],[-118,34],[-117,32],[-104,27],[-97,26],[-90,22],[-85,12],[-83,9],[-79,8],[-77,10],[-83,22],[-88,21],[-96,20],[-104,20],[-110,21],[-116,27],[-122,35],[-126,40],[-132,44],[-140,52],[-150,60],[-160,64],[-165,66],[-168,72]],FOREST);
  // Canada & northern forests
  poly([[-140,74],[-120,72],[-100,70],[-85,68],[-75,66],[-65,50],[-64,46],[-68,44],[-72,42],[-80,44],[-90,46],[-98,50],[-104,54],[-110,58],[-120,60],[-130,57],[-140,60],[-148,62],[-158,64],[-165,66],[-168,72],[-155,73],[-140,74]],TUNDRA);
  // US central plains
  poly([[-104,48],[-97,48],[-90,46],[-88,38],[-92,30],[-97,26],[-104,26],[-108,32],[-104,38],[-104,48]],'#a5d6a7');
  // Greenland
  poly([[-73,83],[-42,83],[-20,76],[-18,70],[-20,66],[-28,63],[-44,60],[-52,62],[-60,65],[-65,69],[-70,74],[-72,80],[-73,83]],ICE);
  poly([[-60,72],[-40,76],[-25,74],[-25,68],[-38,64],[-52,66],[-60,72]],SNOW);

  // ── SOUTH AMERICA ──
  poly([[-80,12],[-77,8],[-72,12],[-65,10],[-52,4],[-38,-4],[-35,-8],[-37,-16],[-40,-22],[-44,-24],[-46,-30],[-50,-34],[-53,-38],[-60,-44],[-65,-52],[-68,-56],[-74,-52],[-74,-42],[-72,-34],[-70,-20],[-75,-10],[-80,0],[-80,8],[-80,12]],JUNGLE);
  // Amazon basin
  poly([[-78,5],[-70,5],[-55,5],[-48,0],[-52,-10],[-60,-10],[-70,-5],[-78,0],[-78,5]],JUNGLE);
  // Andes (use same color but lighter)
  poly([[-76,10],[-72,0],[-68,-20],[-65,-35],[-68,-38],[-72,-30],[-74,-20],[-76,-5],[-78,5],[-76,10]],TUNDRA);
  // Patagonia
  poly([[-70,-40],[-66,-42],[-65,-52],[-68,-56],[-72,-50],[-72,-42],[-70,-40]],TUNDRA);

  // ── EUROPE ──
  poly([[-10,36],[3,36],[10,38],[18,40],[28,42],[38,44],[36,48],[30,52],[26,56],[22,58],[26,64],[28,70],[22,72],[16,72],[10,66],[6,62],[2,58],[-4,48],[-6,44],[-8,38],[-10,36]],LIGHT_FOREST);
  // Iberian peninsula
  poly([[-8,44],[-2,44],[3,42],[2,36],[-6,36],[-9,38],[-8,44]],DRY);
  // UK + Ireland
  poly([[-3,58],[2,52],[0,50],[-5,50],[-6,54],[-4,58],[-3,58]],LIGHT_FOREST);
  poly([[-8,52],[-6,52],[-6,54],[-8,55],[-8,52]],LIGHT_FOREST);
  // Scandinavia
  poly([[5,58],[8,58],[10,64],[14,68],[18,70],[22,70],[28,66],[26,60],[22,58],[16,56],[10,56],[6,58],[5,58]],LIGHT_FOREST);
  // Iceland
  poly([[-24,66],[-13,66],[-13,63],[-24,63],[-24,66]],ICE);

  // ── AFRICA ──
  poly([[-18,37],[10,37],[22,37],[32,32],[38,24],[44,14],[46,8],[44,2],[42,-2],[38,-6],[34,-12],[30,-20],[28,-28],[26,-34],[18,-36],[14,-24],[10,-12],[6,4],[4,12],[0,16],[-6,14],[-14,10],[-16,15],[-18,22],[-18,37]],SAVANNA);
  // Sahara
  poly([[-18,30],[38,30],[38,20],[20,17],[0,16],[-6,14],[-14,16],[-18,22]],DESERT);
  // Kalahari
  poly([[18,-20],[28,-18],[28,-30],[22,-34],[18,-30],[18,-20]],RED_DESERT);
  // Congo rainforest
  poly([[12,4],[20,4],[28,2],[28,-6],[22,-8],[14,-4],[10,0],[12,4]],JUNGLE);
  // Horn of Africa
  poly([[38,16],[50,12],[52,6],[46,0],[40,0],[36,8],[38,16]],RED_DESERT);
  // Madagascar
  poly([[44,-12],[50,-12],[50,-24],[44,-26],[44,-18],[44,-12]],SAVANNA);

  // ── MIDDLE EAST & ARABIA ──
  poly([[36,38],[38,36],[42,36],[48,30],[56,24],[60,18],[56,14],[44,14],[38,24],[34,30],[28,34],[26,38],[36,38]],DESERT);
  // Turkey / Anatolia
  poly([[26,42],[36,38],[42,38],[44,36],[40,34],[36,34],[30,36],[26,38],[26,42]],DRY);

  // ── ASIA ──
  poly([[26,42],[35,46],[42,42],[50,38],[58,38],[62,46],[72,48],[80,46],[90,50],[100,50],[110,48],[120,44],[130,40],[138,42],[140,46],[144,50],[148,58],[142,64],[136,68],[126,70],[110,72],[90,72],[72,72],[58,70],[48,66],[42,62],[34,58],[30,54],[28,50],[26,46],[26,42]],FOREST);
  // Siberia
  poly([[58,68],[90,70],[120,70],[140,68],[148,58],[144,52],[130,52],[110,56],[90,58],[70,60],[58,62],[58,68]],TUNDRA);
  // Gobi desert
  poly([[88,50],[110,50],[116,44],[110,40],[96,40],[88,44],[88,50]],DESERT);
  // India
  poly([[66,38],[72,36],[78,32],[80,22],[76,8],[72,8],[68,18],[64,24],[62,30],[66,38]],SAVANNA);
  // Indian subcontinent rainforest coast
  poly([[76,22],[80,14],[78,8],[72,8],[76,14],[76,22]],JUNGLE);
  // SE Asia mainland
  poly([[98,28],[106,22],[100,14],[100,4],[104,2],[106,2],[108,8],[112,12],[104,18],[100,22],[98,26],[98,28]],JUNGLE);
  // Indonesia (Sumatra, Java, Borneo)
  poly([[96,6],[104,6],[106,2],[100,0],[96,2],[96,6]],JUNGLE);
  poly([[104,2],[108,2],[112,-4],[106,-6],[102,-2],[104,2]],JUNGLE);
  poly([[108,2],[116,2],[118,-2],[114,-4],[110,-2],[108,2]],JUNGLE);
  poly([[108,6],[118,4],[120,0],[116,-2],[110,2],[108,6]],JUNGLE);
  // Philippines
  poly([[120,18],[122,14],[122,8],[120,10],[118,14],[120,18]],JUNGLE);
  // Japan
  poly([[130,44],[134,42],[138,38],[138,34],[132,32],[130,34],[128,36],[130,40],[130,44]],LIGHT_FOREST);
  poly([[140,44],[144,44],[146,40],[142,40],[140,42],[140,44]],LIGHT_FOREST);
  poly([[141,42],[145,44],[145,42],[142,40],[141,42]],LIGHT_FOREST);
  // Korean peninsula
  poly([[126,38],[130,36],[128,34],[126,34],[124,36],[126,38]],LIGHT_FOREST);
  // Sri Lanka
  poly([[80,10],[82,10],[82,8],[80,8],[80,10]],JUNGLE);
  // Central Asia steppe
  poly([[52,48],[70,48],[76,44],[68,36],[58,38],[52,44],[52,48]],DRY);

  // ── AUSTRALIA ──
  poly([[114,-22],[120,-18],[126,-14],[132,-12],[136,-12],[140,-14],[144,-16],[148,-20],[152,-24],[154,-30],[150,-36],[142,-38],[130,-34],[120,-32],[116,-30],[114,-26],[114,-22]],SAVANNA);
  // Interior red desert
  poly([[120,-22],[136,-20],[140,-26],[138,-32],[126,-32],[118,-28],[120,-22]],RED_DESERT);
  // New Guinea
  poly([[132,-2],[140,-2],[148,-6],[140,-8],[132,-6],[132,-2]],JUNGLE);
  // New Zealand North
  poly([[172,-36],[178,-36],[176,-42],[172,-40],[172,-36]],LIGHT_FOREST);
  // New Zealand South
  poly([[168,-44],[172,-44],[172,-46],[170,-48],[166,-46],[168,-44]],LIGHT_FOREST);

  // ── ICE CAPS ──
  poly([[-180,-70],[180,-70],[180,-90],[-180,-90]],ICE);
  poly([[-180,-64],[180,-64],[180,-70],[-180,-70]],'rgba(220,240,255,0.7)');
  poly([[-180,80],[180,80],[180,90],[-180,90]],ICE);
  poly([[-180,74],[180,74],[180,80],[-180,80]],'rgba(210,235,255,0.6)');

  // Cloud wisps (subtle)
  c.globalAlpha=0.12;
  [[W*0.15,H*0.18,W*0.18,H*0.06],[W*0.55,H*0.22,W*0.2,H*0.05],[W*0.75,H*0.42,W*0.16,H*0.04],
   [W*0.3,H*0.62,W*0.22,H*0.05],[W*0.65,H*0.58,W*0.14,H*0.04]].forEach(([x,y,rw,rh])=>{
    const g=c.createRadialGradient(x,y,0,x,y,rw);
    g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=g;
    c.beginPath();c.ellipse(x,y,rw,rh,0,0,Math.PI*2);c.fill();
  });
  c.globalAlpha=1;

  // Polar atmosphere tint
  const ag=c.createLinearGradient(0,0,0,H);
  ag.addColorStop(0,'rgba(100,160,255,0.3)');ag.addColorStop(0.12,'rgba(0,0,0,0)');
  ag.addColorStop(0.88,'rgba(0,0,0,0)');ag.addColorStop(1,'rgba(100,160,255,0.3)');
  c.fillStyle=ag;c.fillRect(0,0,W,H);

  return new THREE.CanvasTexture(cv);
}

// ═══════════════════
//  MOON TEXTURE
// ═══════════════════
function makeMoonTex(){
  const cv=document.createElement('canvas');
  cv.width=256;cv.height=128;
  const c=cv.getContext('2d');
  c.fillStyle='#9e9e9e';c.fillRect(0,0,256,128);
  [[60,40,18],[140,60,12],[200,30,15],[80,90,10],[170,90,8],[100,45,6],[220,70,9],[45,75,7]].forEach(([cx,cy,r])=>{
    const g=c.createRadialGradient(cx,cy,0,cx,cy,r);
    g.addColorStop(0,'rgba(70,70,70,0.65)');
    g.addColorStop(0.7,'rgba(90,90,90,0.3)');
    g.addColorStop(1,'rgba(160,160,160,0)');
    c.fillStyle=g;c.beginPath();c.arc(cx,cy,r,0,Math.PI*2);c.fill();
  });
  return new THREE.CanvasTexture(cv);
}

// ════════════════
//  EARTH MESH
// ════════════════
const earthMat=new THREE.MeshPhongMaterial({map:makeEarthTex(),specular:new THREE.Color(0x334455),shininess:12});
const earthMesh=new THREE.Mesh(new THREE.SphereGeometry(2,64,64),earthMat);
scene.add(earthMesh);
// Try to load a high-quality photo texture; canvas texture is used immediately as fallback
new THREE.TextureLoader().load(
  'https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/textures/planets/earth_atmos_2048.jpg',
  tex=>{earthMat.map=tex;earthMat.needsUpdate=true;}
);

// Atmosphere
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(2.09,48,48),
  new THREE.MeshPhongMaterial({color:0x4488ff,transparent:true,opacity:0.07,side:THREE.FrontSide})
));

// ════════════════
//  MOON
// ════════════════
const moonPivot = new THREE.Object3D();
scene.add(moonPivot);

const moonMesh = new THREE.Mesh(
  new THREE.SphereGeometry(0.55,32,32),
  new THREE.MeshPhongMaterial({map:makeMoonTex()})
);
moonMesh.position.set(9,0.5,0);
moonPivot.add(moonMesh);

// Moon orbit ring
const orbitPts=[];
for(let i=0;i<=96;i++){const a=i/96*Math.PI*2;orbitPts.push(new THREE.Vector3(Math.cos(a)*9,0.5*Math.sin(a)*0+0.5,Math.sin(a)*9));}
const orbitRing=new THREE.Line(
  new THREE.BufferGeometry().setFromPoints(orbitPts),
  new THREE.LineBasicMaterial({color:0x223344,transparent:true,opacity:0.5})
);
moonPivot.add(orbitRing);
orbitRing.visible=false;

// ════════════════
//  LIGHTING
// ════════════════
scene.add(new THREE.AmbientLight(0x112233,1.2));
const sunLight=new THREE.DirectionalLight(0xfff5dd,2.2);
sunLight.position.set(8,2,4);
scene.add(sunLight);

// Sun visual sphere
const sunVisual=new THREE.Mesh(
  new THREE.SphereGeometry(0.55,16,16),
  new THREE.MeshBasicMaterial({color:0xffee44})
);
sunVisual.position.set(14,3.5,7);
sunVisual.visible=false;
scene.add(sunVisual);

// Sun glow (halo)
const sunGlow=new THREE.Mesh(
  new THREE.SphereGeometry(0.9,16,16),
  new THREE.MeshBasicMaterial({color:0xffee44,transparent:true,opacity:0.15})
);
sunGlow.position.copy(sunVisual.position);
sunGlow.visible=false;
scene.add(sunGlow);

// ════════════════════════
//  COUNTRY MARKERS (3D)
// ════════════════════════
function latLonTo3D(lat,lon,r){
  const theta=(90-lat)*Math.PI/180;
  const phi=(lon+180)*Math.PI/180;
  return new THREE.Vector3(
    -r*Math.cos(phi)*Math.sin(theta),
    r*Math.cos(theta),
    r*Math.sin(phi)*Math.sin(theta)
  );
}
function makeMarker(col){
  const m=new THREE.Mesh(
    new THREE.SphereGeometry(0.07,8,8),
    new THREE.MeshBasicMaterial({color:col})
  );
  return m;
}
const jpMarker=makeMarker(0xff5555); jpMarker.position.copy(latLonTo3D(35,139,2.07)); earthMesh.add(jpMarker);
const usMarker=makeMarker(0x5599ff); usMarker.position.copy(latLonTo3D(40,-74,2.07)); earthMesh.add(usMarker);

// ════════════════
//  STATE
// ════════════════
let mode='free';
let rotY=0.3,rotX=0;
let velY=0.001,velX=0;
let isDragging=false,lastX=0,lastY=0;
let autoRotating=false;
let moonAngle=0;
let cameraTargetZ=6;
const tmpV=new THREE.Vector3();

// ════════════════════
//  TOUCH / MOUSE
// ════════════════════
function getXY(e){return e.touches?[e.touches[0].clientX,e.touches[0].clientY]:[e.clientX,e.clientY];}

const C=document.getElementById('c');
C.addEventListener('mousedown',e=>{isDragging=true;[lastX,lastY]=getXY(e);});
C.addEventListener('touchstart',e=>{e.preventDefault();isDragging=true;[lastX,lastY]=getXY(e);},{passive:false});
C.addEventListener('mousemove',onMove);
C.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
C.addEventListener('mouseup',()=>{isDragging=false;});
C.addEventListener('touchend',()=>{isDragging=false;});

function onMove(e){
  if(!isDragging)return;
  const[x,y]=getXY(e);
  const dx=x-lastX, dy=y-lastY;
  velY=dx*0.005; velX=dy*0.004;
  rotY+=velY;
  rotX=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,rotX+velX));
  earthMesh.rotation.set(rotX,rotY,0);
  lastX=x;lastY=y;
}

// ════════════════
//  MODE CONFIG
// ════════════════
const MCFG={
  free:{
    title:'🌏 ちきゅうをまわそう',
    desc:'ゆびでさわって ちきゅうをまわしてみよう！',
    fact:'⭐ ちきゅうはまあるい！まわりの長さは 約40,000km。\nとうきょうからニューヨークまで 約10,800km もあるよ！',
    camZ:6,markers:true,showMoon:false,showDN:false,showPlay:false,sun:false,initRotY:null
  },
  daynight:{
    title:'🌅 ひるとよる',
    desc:'▶をおして じてんをみてみよう！',
    fact:'☀️ ちきゅうはこまのように くるくるまわっているよ！\nにほんが ひるのとき、アメリカは よるなんだ。',
    camZ:7,markers:true,showMoon:false,showDN:true,showPlay:true,sun:true,initRotY:Math.PI
  },
  moon:{
    title:'🌕 つきとちきゅう',
    desc:'つきはちきゅうのまわりを ゆっくりまわっているよ！',
    fact:'🌕 つきとちきゅうのきょりは 約384,400km！\nロケットで 約3日かかるよ！',
    camZ:18,markers:false,showMoon:true,showDN:false,showPlay:false,sun:false,initRotY:null
  },
  space:{
    title:'🚀 うちゅうからみると…',
    desc:'うちゅうからちきゅうをながめてみよう！',
    fact:'🌍 うちゅうからみると、ちきゅうはきれいなあおいまる！\n「アオイホシ」ともよばれているよ。',
    camZ:28,markers:false,showMoon:true,showDN:false,showPlay:false,sun:false,initRotY:null
  },
};

function setMode(m){
  mode=m;
  const cfg=MCFG[m];
  document.getElementById('mode-title').textContent=cfg.title;
  document.getElementById('mode-desc').textContent=cfg.desc;
  document.getElementById('fact').textContent=cfg.fact;
  cameraTargetZ=cfg.camZ;

  if(cfg.initRotY!==null){rotY=cfg.initRotY;velY=0;}

  document.getElementById('japan-label').style.display=cfg.markers?'':'none';
  document.getElementById('america-label').style.display=cfg.markers?'':'none';
  document.getElementById('dn-panel').classList.toggle('show',cfg.showDN);

  const pb=document.getElementById('play-btn');
  pb.classList.toggle('show',cfg.showPlay);
  if(!cfg.showPlay){autoRotating=false;pb.textContent='▶';velY=0.001;}

  sunVisual.visible=cfg.sun;
  sunGlow.visible=cfg.sun;
  orbitRing.visible=cfg.showMoon;
  moonPivot.visible=cfg.showMoon;

  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('btn-'+m).classList.add('active');
}

function togglePlay(){
  autoRotating=!autoRotating;
  document.getElementById('play-btn').textContent=autoRotating?'⏸':'▶';
  if(autoRotating)velY=0;
}

// ════════════════════
//  DAY / NIGHT UPDATE
// ════════════════════
const sunDir=sunLight.position.clone().normalize();
function updateDayNight(){
  if(mode!=='daynight')return;
  [jpMarker,usMarker].forEach((mk,i)=>{
    mk.getWorldPosition(tmpV);
    const inDay=tmpV.normalize().dot(sunDir)>0;
    const el=document.getElementById(i===0?'dn-jp':'dn-us');
    el.textContent=inDay?'☀️ ひる':'🌙 よる';
    el.className='dn-status '+(inDay?'day':'night');
  });
}

// ════════════════════
//  LABEL PROJECTION
// ════════════════════
function projectLabel(marker,labelId){
  const el=document.getElementById(labelId);
  marker.getWorldPosition(tmpV);
  const toMarker=tmpV.clone().normalize();
  const toCamera=camera.position.clone().normalize();
  if(toMarker.dot(toCamera)<0.12){el.style.opacity='0';return;}
  el.style.opacity='1';
  const p=tmpV.project(camera);
  el.style.left=((p.x+1)/2*innerWidth+12)+'px';
  el.style.top=((-p.y+1)/2*innerHeight-8)+'px';
}

function projectMoonLabel(){
  const el=document.getElementById('moon-label');
  if(mode!=='moon'&&mode!=='space'){el.style.display='none';return;}
  moonMesh.getWorldPosition(tmpV);
  const p=tmpV.project(camera);
  if(p.z>1){el.style.display='none';return;}
  el.style.display='block';
  el.style.left=((p.x+1)/2*innerWidth+10)+'px';
  el.style.top=((-p.y+1)/2*innerHeight+30)+'px';
}

// ════════════════
//  ANIMATION LOOP
// ════════════════
const clock=new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  // Camera smooth interpolation
  camera.position.z+=(cameraTargetZ-camera.position.z)*0.04;

  // Earth rotation
  if(!isDragging){
    if(autoRotating){
      rotY+=0.0035;
    } else {
      velY*=0.97;
      velX*=0.97;
      rotY+=(mode==='free'?velY+0.0008:velY);
      rotX=Math.max(-Math.PI/2.4,Math.min(Math.PI/2.4,rotX+velX));
    }
    earthMesh.rotation.set(rotX,rotY,0);
  }

  // Moon orbit
  if(mode==='moon'){
    // Sync moon position to Earth's drag rotation so spinning Earth moves the moon
    moonPivot.rotation.y=rotY*0.15;
  } else {
    moonAngle+=dt*(mode==='space'?0.15:0.25);
    moonPivot.rotation.y=moonAngle;
  }

  // Labels
  const cfg=MCFG[mode];
  if(cfg.markers){
    projectLabel(jpMarker,'japan-label');
    projectLabel(usMarker,'america-label');
  }
  projectMoonLabel();
  updateDayNight();

  renderer.render(scene,camera);
}
animate();

// ════════════════
//  RESIZE
// ════════════════
window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// Start
setMode('free');
</script>
</body>
</html>
