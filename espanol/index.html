<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇪🇸</text></svg>">
<title>Español - スペイン語学習</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,Helvetica,sans-serif;background:#fffbeb;color:#1f2937;min-height:100vh;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;flex-direction:column;}

/* ===== HOME ===== */
#home{align-items:center;justify-content:center;padding:24px;}
.home-inner{max-width:360px;width:100%;}
.home-flag{font-size:64px;text-align:center;margin-bottom:12px;}
.home-title{font-size:28px;font-weight:900;color:#92400e;text-align:center;}
.home-sub{color:#6b7280;text-align:center;margin-bottom:36px;font-size:14px;}
.card{background:#fff;border-radius:20px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #fde68a;display:flex;align-items:center;gap:16px;margin-bottom:12px;cursor:pointer;transition:transform 0.1s,box-shadow 0.1s;text-decoration:none;color:inherit;}
.card:active{transform:scale(0.97);}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.12);border-color:#f59e0b;}
.card-icon{font-size:40px;flex-shrink:0;}
.card-title{font-size:18px;font-weight:700;}
.card-desc{font-size:12px;color:#9ca3af;margin-top:2px;}
.home-luck{text-align:center;font-size:12px;color:#d1d5db;margin-top:20px;}

/* ===== HEADER ===== */
header{display:flex;align-items:center;gap:12px;padding:16px;background:#fff;border-bottom:1px solid #fde68a;box-shadow:0 1px 4px rgba(0,0,0,0.06);}
.back-btn{font-size:20px;font-weight:700;color:#b45309;background:none;border:none;cursor:pointer;padding:4px 8px;}
.header-info h1{font-size:16px;font-weight:700;}
.header-info p{font-size:11px;color:#9ca3af;}
.score-badge{margin-left:auto;text-align:right;}
.score-num{font-size:14px;font-weight:700;color:#b45309;}
.score-label{font-size:10px;color:#9ca3af;}

/* ===== LISTENING ===== */
#listening{padding:0;}
#listening .listen-body{flex:1;display:flex;flex-direction:column;padding:16px;overflow-y:auto;}
.listen-card{background:#fff;border-radius:20px;padding:32px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #fde68a;text-align:center;margin-bottom:20px;}
.listen-hint{font-size:12px;color:#9ca3af;margin-bottom:16px;}
.play-btn{background:#b45309;color:#fff;border:none;border-radius:9999px;width:88px;height:88px;font-size:36px;cursor:pointer;margin:0 auto;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(180,83,9,0.3);}
.play-btn:active{transform:scale(0.95);}
.play-hint{font-size:11px;color:#9ca3af;margin-top:8px;}
.answer-reveal{margin-top:16px;padding-top:16px;border-top:1px solid #f3f4f6;}
.answer-spanish{font-size:18px;font-weight:700;}
.answer-jp{font-size:13px;color:#16a34a;margin-top:4px;}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.choice-btn{padding:16px 10px;border-radius:14px;border:1px solid #e5e7eb;background:#fff;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.15s;line-height:1.3;}
.choice-btn:active{transform:scale(0.97);}
.choice-btn.correct{background:#dcfce7;border-color:#4ade80;color:#15803d;}
.choice-btn.wrong{background:#fee2e2;border-color:#f87171;color:#b91c1c;}
.choice-btn.faded{opacity:0.4;}
.result-box{padding:16px;border-radius:14px;text-align:center;font-size:18px;font-weight:700;margin-bottom:12px;}
.result-box.ok{background:#dcfce7;color:#16a34a;}
.result-box.ng{background:#fee2e2;color:#dc2626;}
.next-btn{width:100%;background:#b45309;color:#fff;border:none;border-radius:14px;padding:16px;font-size:16px;font-weight:700;cursor:pointer;}
.next-btn:active{transform:scale(0.97);}

/* ===== FLASHCARD ===== */
#flashcard{padding:0;}
#flashcard .flash-body{flex:1;display:flex;flex-direction:column;padding:16px;overflow-y:auto;}
.flash-progress{font-size:12px;color:#9ca3af;text-align:center;margin-bottom:12px;}
.flash-card{background:#fff;border-radius:20px;padding:40px 24px;box-shadow:0 2px 8px rgba(0,0,0,0.08);border:1px solid #fde68a;text-align:center;margin-bottom:16px;cursor:pointer;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:transform 0.1s;}
.flash-card:active{transform:scale(0.97);}
.flash-es{font-size:28px;font-weight:900;color:#92400e;}
.flash-kana{font-size:14px;color:#9ca3af;letter-spacing:0.05em;}
.flash-jp{font-size:18px;color:#374151;font-weight:700;}
.flash-tap{font-size:12px;color:#d1d5db;}
.flash-btns{display:flex;gap:10px;}
.flash-btn{flex:1;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;}
.flash-btn.ok{background:#dcfce7;color:#15803d;}
.flash-btn.ng{background:#fee2e2;color:#b91c1c;}
.flash-done{text-align:center;padding:40px 20px;display:flex;flex-direction:column;align-items:center;gap:16px;}
.flash-done-score{font-size:48px;font-weight:900;color:#92400e;}
.flash-done-label{font-size:14px;color:#6b7280;}
</style>
</head>
<body>

<!-- HOME -->
<div id="home" class="screen active">
  <div class="home-inner">
    <div class="home-flag">🇪🇸</div>
    <div class="home-title">Español</div>
    <div class="home-sub">初心者向けスペイン語学習アプリ</div>
    <div class="card" onclick="showListening()">
      <span class="card-icon">👂</span>
      <div>
        <div class="card-title">聞き取り練習</div>
        <div class="card-desc">スペイン語を聞いて意味を当てよう</div>
      </div>
    </div>
    <div class="card" onclick="showFlashcard()">
      <span class="card-icon">🃏</span>
      <div>
        <div class="card-title">単語カード</div>
        <div class="card-desc">単語を覚えよう・めくって確認</div>
      </div>
    </div>
    <div class="home-luck">¡Buena suerte! 頑張ってね！</div>
  </div>
</div>

<!-- LISTENING -->
<div id="listening" class="screen">
  <header>
    <button class="back-btn" onclick="showHome()">←</button>
    <div class="header-info">
      <h1>聞き取り練習</h1>
      <p>スペイン語を聞いて意味を当てよう</p>
    </div>
    <div class="score-badge">
      <div class="score-num" id="score-display">0/0</div>
      <div class="score-label">正解数</div>
    </div>
  </header>
  <div class="listen-body" id="listen-body"></div>
</div>

<!-- FLASHCARD -->
<div id="flashcard" class="screen">
  <header>
    <button class="back-btn" onclick="showHome()">←</button>
    <div class="header-info">
      <h1>単語カード</h1>
      <p>タップでめくる</p>
    </div>
    <div class="score-badge">
      <div class="score-num" id="flash-score-display">0/0</div>
      <div class="score-label">覚えた</div>
    </div>
  </header>
  <div class="flash-body" id="flash-body"></div>
</div>

<script>
// ===== QUESTION BANK =====
const QUESTIONS = [
  {spanish:'Hola',          kana:'オラ',          answer:'こんにちは',  choices:['こんにちは','さようなら','ありがとう','おはよう']},
  {spanish:'Buenos días',   kana:'ブエノス ディアス', answer:'おはようございます', choices:['おやすみなさい','おはようございます','こんばんは','はじめまして']},
  {spanish:'Buenas noches', kana:'ブエナス ノチェス', answer:'こんばんは・おやすみ', choices:['こんにちは','ありがとう','こんばんは・おやすみ','どういたしまして']},
  {spanish:'Gracias',       kana:'グラシアス',     answer:'ありがとう',  choices:['ごめんなさい','どうぞ','ありがとう','よろしく']},
  {spanish:'De nada',       kana:'デ ナダ',        answer:'どういたしまして', choices:['ありがとう','どういたしまして','すみません','はい']},
  {spanish:'Por favor',     kana:'ポル ファボール',  answer:'お願いします', choices:['お願いします','ありがとう','さようなら','もう一度']},
  {spanish:'Lo siento',     kana:'ロ シエント',    answer:'ごめんなさい', choices:['ありがとう','ごめんなさい','こんにちは','大丈夫']},
  {spanish:'¿Cómo estás?',  kana:'コモ エスタス',  answer:'お元気ですか？', choices:['お名前は？','お元気ですか？','何歳ですか？','どこから？']},
  {spanish:'Bien',          kana:'ビエン',         answer:'元気です・良い', choices:['悪い','元気です・良い','まあまあ','疲れた']},
  {spanish:'Mal',           kana:'マル',           answer:'悪い',       choices:['良い','悪い','元気','まあまあ']},
  {spanish:'¿Cómo te llamas?', kana:'コモ テ ジャマス', answer:'お名前は何ですか？', choices:['どこから来ましたか？','お名前は何ですか？','何歳ですか？','何が好きですか？']},
  {spanish:'Me llamo…',    kana:'メ ジャモ',       answer:'私の名前は〜です', choices:['私は〜が好き','私の名前は〜です','私は〜から来た','私は〜歳']},
  {spanish:'Sí',            kana:'シ',             answer:'はい',       choices:['いいえ','はい','たぶん','わからない']},
  {spanish:'No',            kana:'ノ',             answer:'いいえ',     choices:['はい','いいえ','たぶん','わからない']},
  {spanish:'Adiós',         kana:'アディオス',      answer:'さようなら',  choices:['こんにちは','ありがとう','さようなら','またね']},
  {spanish:'Hasta luego',   kana:'アスタ ルエゴ',   answer:'またあとで',  choices:['さようなら','またあとで','おはよう','よい一日を']},
  {spanish:'Agua',          kana:'アグア',          answer:'水',         choices:['水','牛乳','ジュース','コーヒー']},
  {spanish:'Comida',        kana:'コミダ',          answer:'食べ物',     choices:['飲み物','食べ物','お菓子','果物']},
  {spanish:'Casa',          kana:'カサ',            answer:'家',         choices:['学校','家','会社','店']},
  {spanish:'Perro',         kana:'ペロ',            answer:'犬',         choices:['猫','犬','鳥','魚']},
  {spanish:'Gato',          kana:'ガト',            answer:'猫',         choices:['犬','猫','馬','うさぎ']},
  {spanish:'Libro',         kana:'リブロ',          answer:'本',         choices:['本','映画','音楽','絵']},
  {spanish:'Escuela',       kana:'エスクエラ',      answer:'学校',       choices:['病院','学校','駅','銀行']},
  {spanish:'Amigo',         kana:'アミーゴ',        answer:'友達',       choices:['家族','友達','先生','子ども']},
  {spanish:'Amor',          kana:'アモール',        answer:'愛',         choices:['喜び','愛','夢','希望']},
  {spanish:'Uno',           kana:'ウノ',            answer:'1',          choices:['2','3','1','4']},
  {spanish:'Dos',           kana:'ドス',            answer:'2',          choices:['1','2','3','4']},
  {spanish:'Tres',          kana:'トレス',          answer:'3',          choices:['1','2','3','4']},
  {spanish:'Rojo',          kana:'ロホ',            answer:'赤',         choices:['青','赤','黄色','緑']},
  {spanish:'Azul',          kana:'アスール',        answer:'青',         choices:['青','赤','白','黒']},
  {spanish:'Verde',         kana:'ベルデ',          answer:'緑',         choices:['緑','黄色','オレンジ','紫']},
  {spanish:'Blanco',        kana:'ブランコ',        answer:'白',         choices:['黒','白','灰色','茶色']},
  {spanish:'Grande',        kana:'グランデ',        answer:'大きい',     choices:['小さい','大きい','長い','短い']},
  {spanish:'Pequeño',       kana:'ペケーニョ',      answer:'小さい',     choices:['大きい','小さい','重い','軽い']},
  {spanish:'Bueno',         kana:'ブエノ',          answer:'良い',       choices:['悪い','良い','普通','きれい']},
  {spanish:'Malo',          kana:'マロ',            answer:'悪い',       choices:['良い','悪い','面白い','難しい']},
  {spanish:'Mucho',         kana:'ムチョ',          answer:'たくさん',   choices:['少し','たくさん','全部','なし']},
  {spanish:'Poco',          kana:'ポコ',            answer:'少し',       choices:['たくさん','少し','全部','半分']},
  {spanish:'Hoy',           kana:'オイ',            answer:'今日',       choices:['昨日','今日','明日','来週']},
  {spanish:'Mañana',        kana:'マニャーナ',      answer:'明日・朝',   choices:['今日','昨日','明日・朝','夜']},
  {spanish:'¿Dónde está?',  kana:'ドンデ エスタ',   answer:'どこにありますか？', choices:['何ですか？','どこにありますか？','いくらですか？','いつですか？']},
  {spanish:'¿Cuánto cuesta?', kana:'クアント クエスタ', answer:'いくらですか？', choices:['何ですか？','いつですか？','いくらですか？','誰ですか？']},
  {spanish:'Quiero…',      kana:'キエロ',          answer:'〜がほしい・したい', choices:['〜がきらい','〜がほしい・したい','〜が好き','〜がわからない']},
  {spanish:'Me gusta',      kana:'メ グスタ',       answer:'〜が好き',   choices:['〜がきらい','〜が好き','〜がほしい','〜がわかる']},
  {spanish:'No entiendo',   kana:'ノ エンティエンド', answer:'わかりません', choices:['知っています','わかりません','もう一度','ゆっくり']},
  {spanish:'Más despacio',  kana:'マス デスパシオ',  answer:'もっとゆっくり', choices:['もっと速く','もっとゆっくり','もう一度','大きい声で']},
];

// ===== FLASHCARD DATA =====
const WORDS = [
  {es:'Hola',           kana:'オラ',           ja:'こんにちは'},
  {es:'Buenos días',    kana:'ブエノス ディアス', ja:'おはようございます'},
  {es:'Buenas noches',  kana:'ブエナス ノチェス', ja:'こんばんは／おやすみ'},
  {es:'Gracias',        kana:'グラシアス',      ja:'ありがとう'},
  {es:'Por favor',      kana:'ポル ファボール',  ja:'お願いします'},
  {es:'Lo siento',      kana:'ロ シエント',     ja:'ごめんなさい'},
  {es:'Sí / No',        kana:'シ / ノ',         ja:'はい / いいえ'},
  {es:'Adiós',          kana:'アディオス',      ja:'さようなら'},
  {es:'Agua',           kana:'アグア',          ja:'水'},
  {es:'Casa',           kana:'カサ',            ja:'家'},
  {es:'Perro',          kana:'ペロ',            ja:'犬'},
  {es:'Gato',           kana:'ガト',            ja:'猫'},
  {es:'Libro',          kana:'リブロ',          ja:'本'},
  {es:'Escuela',        kana:'エスクエラ',      ja:'学校'},
  {es:'Amigo',          kana:'アミーゴ',        ja:'友達'},
  {es:'Rojo',           kana:'ロホ',            ja:'赤'},
  {es:'Azul',           kana:'アスール',        ja:'青'},
  {es:'Verde',          kana:'ベルデ',          ja:'緑'},
  {es:'Grande',         kana:'グランデ',        ja:'大きい'},
  {es:'Pequeño',        kana:'ペケーニョ',      ja:'小さい'},
  {es:'Mucho',          kana:'ムチョ',          ja:'たくさん'},
  {es:'Poco',           kana:'ポコ',            ja:'少し'},
  {es:'Hoy',            kana:'オイ',            ja:'今日'},
  {es:'Mañana',         kana:'マニャーナ',      ja:'明日／朝'},
  {es:'Me gusta',       kana:'メ グスタ',       ja:'〜が好き'},
  {es:'Quiero',         kana:'キエロ',          ja:'〜がほしい／したい'},
  {es:'No entiendo',    kana:'ノ エンティエンド', ja:'わかりません'},
  {es:'Más despacio',   kana:'マス デスパシオ',  ja:'もっとゆっくり'},
  {es:'Uno / Dos / Tres', kana:'ウノ / ドス / トレス', ja:'1 / 2 / 3'},
  {es:'¿Cuánto cuesta?', kana:'クアント クエスタ', ja:'いくらですか？'},
];

// ===== STATE =====
let listenScore = {correct:0, total:0};
let currentQuestion = null;
let listenSelected = null;
let usedIndices = [];

let flashWords = [];
let flashIdx = 0;
let flashFlipped = false;
let flashOk = 0;

// ===== NAV =====
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showHome() { show('home'); }

function showListening() {
  show('listening');
  listenScore = {correct:0, total:0};
  usedIndices = [];
  nextQuestion();
}

function showFlashcard() {
  flashWords = shuffle([...WORDS]);
  flashIdx = 0;
  flashOk = 0;
  flashFlipped = false;
  show('flashcard');
  renderFlash();
}

// ===== LISTENING =====
function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function nextQuestion() {
  if (usedIndices.length >= QUESTIONS.length) usedIndices = [];
  const pool = QUESTIONS.map((_, i) => i).filter(i => !usedIndices.includes(i));
  const idx = pool[Math.floor(Math.random() * pool.length)];
  usedIndices.push(idx);
  const q = QUESTIONS[idx];
  // Shuffle choices
  const choices = shuffle([...q.choices]);
  const correctIndex = choices.indexOf(q.answer);
  currentQuestion = {...q, choices, correctIndex};
  listenSelected = null;
  renderListening();
}

function renderListening() {
  document.getElementById('score-display').textContent = `${listenScore.correct}/${listenScore.total}`;
  const body = document.getElementById('listen-body');
  const q = currentQuestion;
  const answered = listenSelected !== null;

  const answerHTML = answered
    ? `<div class="answer-reveal"><div class="answer-spanish">${q.spanish}</div><div class="answer-jp">正解: ${q.answer}</div></div>`
    : '';

  const choicesHTML = q.choices.map((c, i) => {
    let cls = 'choice-btn';
    if (answered) {
      if (i === q.correctIndex) cls += ' correct';
      else if (i === listenSelected) cls += ' wrong';
      else cls += ' faded';
    }
    return `<button class="${cls}" onclick="selectChoice(${i})" ${answered ? 'disabled' : ''}>${c}</button>`;
  }).join('');

  const resultHTML = answered ? `
    <div class="result-box ${listenSelected === q.correctIndex ? 'ok' : 'ng'}">${listenSelected === q.correctIndex ? '🎉 正解！' : '😢 不正解...'}</div>
    <button class="next-btn" onclick="nextQuestion()">次の問題へ →</button>` : '';

  body.innerHTML = `
    <div class="listen-card">
      <div class="listen-hint">スペイン語の音声を聞いて意味を選んでください</div>
      <button class="play-btn" onclick="playQuestion()">🔊</button>
      <div class="play-hint">${answered ? 'もう一度聞く' : 'タップして音声を再生'}</div>
      ${answerHTML}
    </div>
    <div class="choices">${choicesHTML}</div>
    ${resultHTML}`;
}

function playQuestion() {
  if (!currentQuestion) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(currentQuestion.spanish);
  u.lang = 'es-ES';
  u.rate = 0.8;
  window.speechSynthesis.speak(u);
}

function selectChoice(index) {
  if (listenSelected !== null || !currentQuestion) return;
  listenSelected = index;
  listenScore.total++;
  if (index === currentQuestion.correctIndex) listenScore.correct++;
  renderListening();
}

// ===== FLASHCARD =====
function renderFlash() {
  document.getElementById('flash-score-display').textContent = `${flashOk}/${flashWords.length}`;
  const body = document.getElementById('flash-body');

  if (flashIdx >= flashWords.length) {
    body.innerHTML = `
      <div class="flash-done">
        <div style="font-size:48px">🎉</div>
        <div class="flash-done-score">${flashOk}/${flashWords.length}</div>
        <div class="flash-done-label">覚えた単語</div>
        <button class="next-btn" style="margin-top:8px" onclick="showFlashcard()">もう一度</button>
        <button class="next-btn" style="margin-top:8px;background:#6b7280" onclick="showHome()">ホームへ</button>
      </div>`;
    return;
  }

  const w = flashWords[flashIdx];
  body.innerHTML = `
    <div class="flash-progress">${flashIdx + 1} / ${flashWords.length}</div>
    <div class="flash-card" onclick="flipFlash()">
      <div class="flash-es">${w.es}</div>
      <div class="flash-kana">${w.kana}</div>
      ${flashFlipped
        ? `<div class="flash-jp">${w.ja}</div><button class="play-btn" style="width:52px;height:52px;font-size:22px;margin-top:8px" onclick="event.stopPropagation();speakWord('${w.es}')">🔊</button>`
        : `<div class="flash-tap">タップして答えを見る</div>`}
    </div>
    ${flashFlipped ? `
    <div class="flash-btns">
      <button class="flash-btn ng" onclick="flashAnswer(false)">😢 まだ</button>
      <button class="flash-btn ok" onclick="flashAnswer(true)">✅ 覚えた！</button>
    </div>` : ''}`;
}

function flipFlash() {
  flashFlipped = !flashFlipped;
  renderFlash();
}

function flashAnswer(ok) {
  if (ok) flashOk++;
  flashIdx++;
  flashFlipped = false;
  renderFlash();
}

function speakWord(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'es-ES';
  u.rate = 0.8;
  window.speechSynthesis.speak(u);
}
</script>
</body>
</html>
