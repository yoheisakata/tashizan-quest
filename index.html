<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<title>ゲームひろば 🎮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Nunito', sans-serif;
  background: #07080f;
  color: #eee;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px 60px;
  overflow-x: hidden;
}

/* Ambient background blobs */
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(168,85,247,0.12) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 80% 85%, rgba(56,189,248,0.1) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 60% 40%, rgba(251,191,36,0.06) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.header {
  position: relative; z-index: 1;
  text-align: center;
  margin-bottom: 40px;
}
.header h1 {
  font-size: 1.9rem; font-weight: 900;
  background: linear-gradient(135deg, #f5c518 0%, #a855f7 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}
.header p { color: #555; font-size: 0.82rem; }

/* Section label */
.section {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  margin-bottom: 16px;
}
.section-label {
  font-size: 0.68rem; font-weight: 900;
  letter-spacing: 0.14em; text-transform: uppercase;
  color: #444;
  padding: 0 4px;
  margin-bottom: 14px;
}

/* Icon grid */
.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px 12px;
  width: 100%;
}
.grid.cols3 { grid-template-columns: repeat(3, 1fr); }

/* App icon */
.app {
  display: flex; flex-direction: column;
  align-items: center; gap: 8px;
  text-decoration: none; color: #ddd;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
.app:active .icon-wrap { transform: scale(0.88); }

.icon-wrap {
  position: relative;
  width: 72px; height: 72px;
  border-radius: 20px;
  display: flex; align-items: center; justify-content: center;
  font-size: 2.2rem;
  transition: transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  overflow: hidden;
}
/* Subtle shine overlay */
.icon-wrap::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 55%);
  border-radius: inherit;
  pointer-events: none;
}

/* Per-app gradient backgrounds */
.app.tashizan  .icon-wrap { background: linear-gradient(135deg,#92400e,#d97706); box-shadow: 0 6px 20px rgba(217,119,6,0.4); }
.app.gomi      .icon-wrap { background: linear-gradient(135deg,#065f46,#10b981); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }
.app.espanol   .icon-wrap { background: linear-gradient(135deg,#7c2d12,#ea580c); box-shadow: 0 6px 20px rgba(234,88,12,0.35); }
.app.earth     .icon-wrap { background: linear-gradient(135deg,#1e3a5f,#3b82f6); box-shadow: 0 6px 20px rgba(59,130,246,0.4); }
.app.tarot     .icon-wrap { background: linear-gradient(135deg,#3b0764,#9333ea); box-shadow: 0 6px 20px rgba(147,51,234,0.45); }
.app.quiz      .icon-wrap { background: linear-gradient(135deg,#4c1d95,#7c3aed); box-shadow: 0 6px 20px rgba(124,58,237,0.4); }
.app.tetris    .icon-wrap { background: linear-gradient(135deg,#831843,#ec4899); box-shadow: 0 6px 20px rgba(236,72,153,0.45); }
.app.escape    .icon-wrap { background: linear-gradient(135deg,#0c1445,#1e40af); box-shadow: 0 6px 20px rgba(30,64,175,0.5); }
.app.puzzle    .icon-wrap { background: linear-gradient(135deg,#4c1d95,#7c3aed); box-shadow: 0 6px 20px rgba(124,58,237,0.5); }

.app-name {
  font-size: 0.7rem; font-weight: 700;
  text-align: center; line-height: 1.3;
  color: rgba(255,255,255,0.75);
  max-width: 76px;
  word-break: keep-all;
}

/* NEW badge */
.new-badge {
  position: absolute; top: -5px; right: -5px;
  background: linear-gradient(135deg,#ef4444,#b91c1c);
  color: #fff; font-size: 0.55rem; font-weight: 900;
  padding: 2px 6px; border-radius: 100px;
  font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 6px rgba(239,68,68,0.5);
  letter-spacing: 0.04em;
}

/* Divider */
.divider {
  width: 100%; max-width: 480px;
  border: none;
  border-top: 1px solid rgba(255,255,255,0.06);
  margin: 28px 0 24px;
  position: relative; z-index: 1;
}
</style>
</head>
<body>

<div class="header">
  <h1>🎮 ゲームひろば</h1>
  <p>あそびたいアプリをえらんでね</p>
</div>

<!-- Games -->
<div class="section">
  <div class="section-label">🕹️ ゲーム</div>
  <div class="grid">

    <a class="app tashizan" href="tashizan/">
      <div class="icon-wrap">⚔️</div>
      <div class="app-name">たしざん<br>クエスト</div>
    </a>

    <a class="app gomi" href="gomi/">
      <div class="icon-wrap">♻️</div>
      <div class="app-name">ゴミ<br>クエスト</div>
    </a>


    <a class="app earth" href="earth/">
      <div class="icon-wrap">🌏</div>
      <div class="app-name">ちきゅうを<br>まなぼう</div>
    </a>

    <a class="app tetris" href="tetris/">
      <div class="icon-wrap">🧩</div>
      <div class="app-name">かわいい<br>テトリス</div>
    </a>

    <a class="app escape" href="escape/">
      <div class="icon-wrap">🚀<span class="new-badge">NEW</span></div>
      <div class="app-name">うちゅうせん<br>だっしゅつ</div>
    </a>

    <a class="app puzzle" href="puzzle/">
      <div class="icon-wrap">🎯<span class="new-badge">NEW</span></div>
      <div class="app-name">パズル<br>らんど</div>
    </a>

  </div>
</div>

<hr class="divider">

<!-- Learn -->
<div class="section">
  <div class="section-label">📚 まなぶ</div>
  <div class="grid cols3">

    <a class="app espanol" href="espanol/">
      <div class="icon-wrap">🇪🇸</div>
      <div class="app-name">Español<br>会話</div>
    </a>

    <a class="app tarot" href="tarot/">
      <div class="icon-wrap">🔮</div>
      <div class="app-name">タロット<br>占い</div>
    </a>

    <a class="app quiz" href="tarot/quiz.html">
      <div class="icon-wrap">🃏</div>
      <div class="app-name">タロット<br>クイズ</div>
    </a>

  </div>
</div>

</body>
</html>
