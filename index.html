<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎮</text></svg>">
<title>ゲームひろば 🎮</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#0a0a18;color:#eee;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(168,85,247,0.1) 0%,transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(46,213,115,0.08) 0%,transparent 50%);pointer-events:none;}
.title{font-size:2rem;font-weight:900;background:linear-gradient(135deg,#f5c518,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px;text-align:center;}
.sub{color:#777;font-size:0.85rem;margin-bottom:32px;text-align:center;}
.games{display:flex;flex-direction:column;gap:16px;width:100%;max-width:340px;}
.game-card{background:#111128;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:20px;text-decoration:none;color:#eee;transition:transform 0.15s,border-color 0.15s;display:flex;align-items:center;gap:16px;}
.game-card:hover,.game-card:active{transform:scale(0.97);}
.game-card.tashizan{border-color:rgba(245,197,24,0.4);}
.game-card.tashizan:hover{border-color:rgba(245,197,24,0.8);}
.game-card.gomi{border-color:rgba(46,213,115,0.4);}
.game-card.gomi:hover{border-color:rgba(46,213,115,0.8);}
.game-card.espanol{border-color:rgba(251,191,36,0.4);}
.game-card.espanol:hover{border-color:rgba(251,191,36,0.8);}
.game-icon{font-size:3rem;flex-shrink:0;}
.game-info{flex:1;}
.game-name{font-size:1.1rem;font-weight:900;margin-bottom:4px;}
.game-name.gold{color:#f5c518;}
.game-name.green{color:#2ed573;}
.game-desc{font-size:0.75rem;color:#777;line-height:1.5;}
.new-badge{background:linear-gradient(135deg,#ff4757,#c0392b);color:#fff;font-size:0.6rem;font-weight:900;padding:2px 7px;border-radius:100px;margin-left:6px;vertical-align:middle;}
</style>
</head>
<body>
<div class="title">🎮 ゲームひろば</div>
<div class="sub">あそびたいゲームをえらんでね</div>
<div class="games">
  <a class="game-card tashizan" href="tashizan/">
    <div class="game-icon">⚔️</div>
    <div class="game-info">
      <div class="game-name gold">たしざんクエスト</div>
      <div class="game-desc">計算問題をといてモンスターをたおそう！<br>レベルアップして最強の勇者になれ！</div>
    </div>
  </a>
  <a class="game-card gomi" href="gomi/">
    <div class="game-icon">♻️</div>
    <div class="game-info">
      <div class="game-name green">ゴミクエスト</div>
      <div class="game-desc">落ちてくるゴミをタップして集めよう！<br>60秒でどれだけ稼げるかな？</div>
    </div>
  </a>
  <a class="game-card espanol" href="espanol/">
    <div class="game-icon">🇪🇸</div>
    <div class="game-info">
      <div class="game-name" style="color:#f59e0b">Español <span class="new-badge">NEW</span></div>
      <div class="game-desc">AIとスペイン語で会話練習しよう！<br>聞き取り問題にも挑戦できるよ</div>
    </div>
  </a>
</div>
</body>
</html>
